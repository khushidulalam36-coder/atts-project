            // ─── INDICATOR CALCULATIONS ────────────────────────────────────
            function calculateEMA(data, period) {
                if (data.length < period) return [];
                const ema = [];
                const k = 2 / (period + 1);
                let sum = 0;
                for (let i = 0; i < period; i++) sum += data[i].close;
                let prevEma = sum / period;
                ema.push({ time: data[period - 1].time, value: +prevEma.toFixed(4) });
                for (let i = period; i < data.length; i++) {
                    prevEma = data[i].close * k + prevEma * (1 - k);
                    ema.push({ time: data[i].time, value: +prevEma.toFixed(4) });
                }
                return ema;
            }

            function calculateSMA(data, period) {
                if (data.length < period) return [];
                const sma = [];
                for (let i = period - 1; i < data.length; i++) {
                    let sum = 0;
                    for (let j = 0; j < period; j++) sum += data[i - j].close;
                    sma.push({ time: data[i].time, value: +(sum / period).toFixed(4) });
                }
                return sma;
            }

            function calculateBB(data, period = 20, stdDev = 2) {
                const sma = calculateSMA(data, period);
                const upper = [],
                    lower = [];
                for (let i = period - 1; i < data.length; i++) {
                    let sum = 0;
                    for (let j = 0; j < period; j++) sum += data[i - j].close;
                    const mean = sum / period;
                    let variance = 0;
                    for (let j = 0; j < period; j++) variance += Math.pow(data[i - j].close - mean, 2);
                    const std = Math.sqrt(variance / period);
                    upper.push({ time: data[i].time, value: +(mean + stdDev * std).toFixed(4) });
                    lower.push({ time: data[i].time, value: +(mean - stdDev * std).toFixed(4) });
                }
                return { sma, upper, lower };
            }

            function calculateRSI(data, period = 14) {
                if (data.length < period + 1) return [];
                const rsi = [];
                let avgGain = 0,
                    avgLoss = 0;
                for (let i = 1; i <= period; i++) {
                    const diff = data[i].close - data[i - 1].close;
                    if (diff > 0) avgGain += diff;
                    else avgLoss -= diff;
                }
                avgGain /= period;
                avgLoss /= period;
                for (let i = period; i < data.length; i++) {
                    if (avgLoss === 0) rsi.push({ time: data[i].time, value: 100 });
                    else { const rs = avgGain / avgLoss;
                        rsi.push({ time: data[i].time, value: +(100 - 100 / (1 + rs)).toFixed(2) }); }
                    const diff = data[i].close - data[i - 1].close;
                    const gain = diff > 0 ? diff : 0;
                    const loss = diff < 0 ? -diff : 0;
                    avgGain = (avgGain * (period - 1) + gain) / period;
                    avgLoss = (avgLoss * (period - 1) + loss) / period;
                }
                return rsi;
            }

            function calculateMACD(data, fast = 12, slow = 26, signal = 9) {
                const emaFast = calculateEMA(data, fast);
                const emaSlow = calculateEMA(data, slow);
                const macdLine = [];
                for (let i = 0; i < data.length; i++) {
                    const f = emaFast.find(e => e.time === data[i].time);
                    const s = emaSlow.find(e => e.time === data[i].time);
                    if (f && s) macdLine.push({ time: data[i].time, value: +(f.value - s.value).toFixed(4) });
                }
                if (macdLine.length === 0) return { macd: [], signal: [], histogram: [] };
                const signalLine = calculateEMAFromValues(macdLine, signal);
                const histogram = [];
                for (let i = 0; i < macdLine.length; i++) {
                    const sig = signalLine.find(s => s.time === macdLine[i].time);
                    if (sig) histogram.push({ time: macdLine[i].time, value: +(macdLine[i].value - sig.value)
                            .toFixed(4) });
                }
                return { macd: macdLine, signal: signalLine, histogram };
            }

            function calculateEMAFromValues(data, period) {
                if (data.length === 0) return [];
                const ema = [];
                const k = 2 / (period + 1);
                let sum = 0;
                const startIdx = Math.min(period, data.length);
                for (let i = 0; i < startIdx; i++) sum += data[i].value;
                let prevEma = sum / startIdx;
                ema.push({ time: data[startIdx - 1].time, value: +prevEma.toFixed(4) });
                for (let i = startIdx; i < data.length; i++) {
                    prevEma = data[i].value * k + prevEma * (1 - k);
                    ema.push({ time: data[i].time, value: +prevEma.toFixed(4) });
                }
                return ema;
            }

            function calculateStochastic(data, period = 14, kPeriod = 3, dPeriod = 3) {
                if (data.length < period) return { k: [], d: [] };
                const kValues = [];
                for (let i = period - 1; i < data.length; i++) {
                    let high = -Infinity,
                        low = Infinity;
                    for (let j = i - period + 1; j <= i; j++) {
                        if (data[j].high > high) high = data[j].high;
                        if (data[j].low < low) low = data[j].low;
                    }
                    const range = high - low;
                    const val = range === 0 ? 50 : ((data[i].close - low) / range) * 100;
                    kValues.push({ time: data[i].time, value: +val.toFixed(2) });
                }
                const kSma = calculateSMAFromValues(kValues, kPeriod);
                const dSma = calculateSMAFromValues(kSma, dPeriod);
                return { k: kSma, d: dSma };
            }

            function calculateSMAFromValues(data, period) {
                if (data.length < period) return [];
                const sma = [];
                for (let i = period - 1; i < data.length; i++) {
                    let sum = 0;
                    for (let j = 0; j < period; j++) sum += data[i - j].value;
                    sma.push({ time: data[i].time, value: +(sum / period).toFixed(2) });
                }
                return sma;
            }

            function calculateVWAP(data) {
                if (data.length === 0) return [];
                let cumVolume = 0,
                    cumPriceVolume = 0;
                const vwap = [];
                for (let i = 0; i < data.length; i++) {
                    const typical = (data[i].high + data[i].low + data[i].close) / 3;
                    cumVolume += data[i].volume;
                    cumPriceVolume += typical * data[i].volume;
                    const val = cumVolume === 0 ? data[i].close : cumPriceVolume / cumVolume;
                    vwap.push({ time: data[i].time, value: +val.toFixed(4) });
                }
                return vwap;
            }

            function generateSeamlessSimulatedCandles(sym, count, targetPrice, intervalSec) {
                const candles = [];
                const now = Math.floor(Date.now() / 1000);
                let price = targetPrice * 0.98;
                for (let i = count - 1; i >= 0; i--) {
                    const time = now - (i + 1) * intervalSec;
                    const open = price;
                    const progress = (count - i) / count;
                    const target = targetPrice * 0.98 + (targetPrice * 0.02) * progress;
                    const change = (target - open) * (0.1 + Math.random() * 0.4);
                    const close = i === 0 ? targetPrice : open + change;
                    const high = Math.max(open, close) + Math.abs(change) * 0.2;
                    const low = Math.min(open, close) - Math.abs(change) * 0.2;
                    const volume = Math.floor(50000 + Math.random() * 200000);
                    candles.push({ time, open: +open.toFixed(4), high: +high.toFixed(4), low: +low.toFixed(4),
                        close: +close.toFixed(4), volume });
                    price = close;
                }
                candles.sort((a, b) => a.time - b.time);
                simLastPrices[sym] = targetPrice;
                simBasePrices[sym] = targetPrice;
                return candles;
            }
