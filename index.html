// ─── MOBILE TRADING TERMINAL (MT5 REAL BROKER STYLE) ────────────────
let mobileWatchlist = JSON.parse(localStorage.getItem('watchlist') || '["AAPL","TSLA","MSFT","GOOGL","AMZN","EURUSD","GBPUSD"]');
let currentMobileLot = 0.01;
function saveWatchlist() { localStorage.setItem('watchlist', JSON.stringify(mobileWatchlist)); }
window.setMobileLot = function(lot) { currentMobileLot = lot; document.getElementById('mobileLotSize').textContent = lot.toFixed(2); };
window.changeMobileLot = function(delta) { const newLot = Math.max(0.01, currentMobileLot + delta * 0.01); window.setMobileLot(+(newLot.toFixed(2))); };

function renderMobileTerminal(container) {
    if (!portfolio) portfolio = { cash: 100000, holdings: {}, transactions: [], drawnLines: {} };
    cleanupSimIntervals(); simAllCandles = []; simCurrentCandle = null; activeIndicators = {}; simIndicatorSeries = {};
    if (!portfolio.drawnLines[simCurrentSymbol]) portfolio.drawnLines[simCurrentSymbol] = [];
    container.innerHTML = `
        <div class="mobile-terminal">
            <div class="mt5-top-toolbar">
                <div class="mt5-toolbar-left">
                    <i class="fas fa-bars mt5-hamburger" id="mt5Hamburger"></i>
                    <span class="mt5-symbol">${simCurrentSymbol}</span>
                </div>
                <div class="mt5-toolbar-right">
                    <i class="fas fa-chart-line mt5-indicator-btn" id="mt5IndicatorBtn"></i>
                    <select id="mt5TfSelect" class="mt5-tf-select">
                        ${Object.keys(timeframeIntervals).map(k => `<option value="${timeframeIntervals[k]}" ${timeframeIntervals[k]===currentTimeframe?'selected':''}>${k}</option>`).join('')}
                    </select>
                </div>
            </div>
            <div class="mt5-instrument-info">
                <span class="mt5-pair">${simCurrentSymbol}</span>
                <span class="mt5-name">${simCurrentSymbol} / USD</span>
                <span class="mt5-tf-display" id="mobileTfDisplay">${Object.keys(timeframeIntervals).find(k => timeframeIntervals[k] === currentTimeframe)}</span>
            </div>
            <div class="mt5-quick-trade">
                <div class="mt5-quick-trade-row">
                    <button class="mt5-sell-btn" onclick="placeSimOrderMobile('sell', currentMobileLot, 0, 0)">SELL<br><span class="mt5-price-display" id="mobileSellPrice">-</span></button>
                    <div class="mt5-lot-selector">
                        <button onclick="changeMobileLot(-1)">▼</button>
                        <span class="mt5-lot-value" id="mobileLotSize">0.01</span>
                        <button onclick="changeMobileLot(1)">▲</button>
                        <div class="mt5-lot-presets">
                            <button onclick="setMobileLot(0.01)">0.01</button>
                            <button onclick="setMobileLot(0.1)">0.10</button>
                            <button onclick="setMobileLot(1)">1.00</button>
                        </div>
                    </div>
                    <button class="mt5-buy-btn" onclick="placeSimOrderMobile('buy', currentMobileLot, 0, 0)">BUY<br><span class="mt5-price-display" id="mobileBuyPrice">-</span></button>
                </div>
            </div>
            <div class="mobile-chart-container" id="mobileChartContainer">
                <div id="simChartContainer" style="width:100%;height:100%;"></div>
            </div>
            <div class="mt5-bottom-nav">
                <div class="mt5-nav-item active" data-panel="quotes">📋 Quotes</div>
                <div class="mt5-nav-item" data-panel="chart">📈 Chart</div>
                <div class="mt5-nav-item" data-panel="trade">💰 Trade</div>
                <div class="mt5-nav-item" data-panel="history">📜 History</div>
            </div>
            <div class="mobile-panels" id="mobilePanels">
                <div class="panel-content" id="quotesPanel" style="display:none;"></div>
                <div class="panel-content" id="tradePanel" style="display:none;"></div>
                <div class="panel-content" id="historyPanel" style="display:none;"></div>
            </div>
        </div>
    `;
    // Hamburger opens simple sidebar (indicators + timeframes + dark/light)
    document.getElementById('mt5Hamburger').onclick = () => openMobileSidebar();
    document.getElementById('mt5IndicatorBtn').onclick = () => {
        const overlay = document.getElementById('mt5IndicatorOverlay');
        if (overlay) overlay.classList.toggle('show');
    };
    document.getElementById('mt5TfSelect').onchange = function() { currentTimeframe = parseInt(this.value); document.getElementById('mobileTfDisplay').textContent = Object.keys(timeframeIntervals).find(k => timeframeIntervals[k] === currentTimeframe); resetChart(); };
    const navItems = document.querySelectorAll('.mt5-nav-item');
    const panelsDiv = document.getElementById('mobilePanels');
    navItems.forEach(item => {
        item.onclick = () => {
            navItems.forEach(n => n.classList.remove('active'));
            item.classList.add('active');
            const panel = item.dataset.panel;
            if (panel === 'chart') { panelsDiv.classList.remove('show'); }
            else { panelsDiv.classList.add('show'); document.querySelectorAll('.panel-content').forEach(p => p.style.display = 'none'); const activePanel = document.getElementById(panel + 'Panel'); if (activePanel) activePanel.style.display = 'block'; updateMobilePanel(panel); }
            setTimeout(() => { if (simChart) { const chartDiv = document.getElementById('simChartContainer'); if (chartDiv && chartDiv.clientWidth > 0) { simChart.applyOptions({ width: chartDiv.clientWidth, height: chartDiv.clientHeight }); simChart.timeScale().fitContent(); } } }, 100);
        };
    });
    requestAnimationFrame(() => requestAnimationFrame(() => initChart()));
    updateMobilePanel('quotes');
    updateMobileTopBar();
}

function openMobileSidebar() {
    // Simple sidebar overlay
    const existing = document.getElementById('mobileSidebarOverlay');
    if (existing) { existing.remove(); return; }
    const overlay = document.createElement('div');
    overlay.className = 'modal'; overlay.id = 'mobileSidebarOverlay';
    overlay.style.justifyContent = 'flex-start'; overlay.style.alignItems = 'flex-start';
    overlay.innerHTML = `<div class="modal-content" style="width:280px;height:100vh;margin:0;border-radius:0;background:var(--mt5-surface);">
        <h3 style="color:var(--mt5-text-bright);margin-bottom:16px;">☰ Menu</h3>
        <h4>Timeframe</h4>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">${Object.keys(timeframeIntervals).map(k => `<button class="tool-btn" onclick="document.getElementById('mt5TfSelect').value='${timeframeIntervals[k]}'; document.getElementById('mt5TfSelect').onchange(); document.getElementById('mobileSidebarOverlay').remove();">${k}</button>`).join('')}</div>
        <h4>Indicators</h4>
        <div>${Object.entries(indicatorNames).map(([k,name]) => `<label class="indicator-item"><input type="checkbox" data-ind="${k}" ${activeIndicators[k]?'checked':''} onchange="activeIndicators['${k}']=this.checked; updateAllIndicators();"><span style="color:${indicatorColors[k]||'#fff'};">${name}</span></label>`).join('')}</div>
        <h4>Theme</h4>
        <button class="btn btn-outline btn-sm" onclick="appTheme=appTheme==='dark'?'light':'dark'; applyTheme(); document.getElementById('mobileSidebarOverlay').remove();">${appTheme==='dark'?'☀️ Light':'🌙 Dark'}</button>
        <button class="btn btn-outline btn-sm" style="margin-top:10px;" onclick="document.getElementById('mobileSidebarOverlay').remove();">Close</button>
    </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

function updateMobilePanel(panel) {
    if (panel === 'quotes') renderMobileWatchlist();
    else if (panel === 'trade') renderMobileTradeSummary();
    else if (panel === 'history') renderMobileHistory();
}

function renderMobileWatchlist() {
    const panel = document.getElementById('quotesPanel'); if (!panel) return;
    let html = `<div class="mobile-search"><input type="text" id="watchlistSearch" placeholder="Search symbol..." oninput="window.watchlistSearch(this.value)"></div>`;
    html += mobileWatchlist.map(sym => {
        const price = simLastPrices[sym] || '-';
        return `<div class="watchlist-item" onclick="selectMobileSymbol('${sym}')"><span class="sym">${sym}</span><span class="price">$${typeof price === 'number' ? price.toFixed(4) : price}</span></div>`;
    }).join('');
    panel.innerHTML = html;
}

window.watchlistSearch = function(query) {
    const panel = document.getElementById('quotesPanel'); if (!panel) return;
    const filtered = query ? mobileWatchlist.filter(s => s.toLowerCase().includes(query.toLowerCase())) : mobileWatchlist;
    panel.innerHTML = `<div class="mobile-search"><input type="text" id="watchlistSearch" placeholder="Search symbol..." value="${query}" oninput="window.watchlistSearch(this.value)"></div>` +
        filtered.map(sym => `<div class="watchlist-item" onclick="selectMobileSymbol('${sym}')"><span class="sym">${sym}</span><span class="price">$${typeof simLastPrices[sym] === 'number' ? simLastPrices[sym].toFixed(4) : '-'}</span></div>`).join('');
};

function selectMobileSymbol(sym) {
    simCurrentSymbol = sym; cleanupSimIntervals(); simAllCandles = []; simCurrentCandle = null; activeIndicators = {}; simIndicatorSeries = {};
    document.querySelector('.mt5-symbol').textContent = sym; document.querySelector('.mt5-pair').textContent = sym;
    updateMobileTopBar(); initChart(); document.querySelector('.mt5-nav-item[data-panel="chart"]').click();
}

function renderMobileTradeSummary() {
    const panel = document.getElementById('tradePanel'); if (!panel) return;
    let html = '<div style="padding:10px;"><h4>Open Positions</h4>';
    if (Object.keys(portfolio.holdings).length === 0) { html += '<div style="color:var(--text-muted);">No open positions</div>'; }
    else { for (let sym in portfolio.holdings) { const h = portfolio.holdings[sym]; const cp = simLastPrices[sym] || h.currentPrice || h.avgPrice; const pl = h.qty > 0 ? (cp - h.avgPrice) * h.qty : (h.avgPrice - cp) * Math.abs(h.qty); html += `<div class="position-card"><div class="row"><strong>${sym}</strong> <span>${Math.abs(h.qty)} Qty</span></div><div class="row"><span>P&L</span> <span style="color:${pl>=0?'var(--success)':'var(--danger)'};">${pl>=0?'+':''}$${pl.toFixed(2)}</span></div><button class="exit-btn" onclick="exitPosition('${sym}')">Exit</button></div>`; } }
    html += `<p>Balance: $${portfolio.cash.toFixed(2)}</p>`;
    html += `<div class="mt5-deposit-withdraw"><input type="number" id="depositAmount" placeholder="Amount"><button onclick="depositFunds()">Deposit</button><button onclick="withdrawFunds()" style="background:var(--mt5-red);">Withdraw</button></div>`;
    html += '</div>';
    panel.innerHTML = html;
}

function depositFunds() {
    const amt = parseFloat(document.getElementById('depositAmount')?.value);
    if (!amt || amt <= 0) return showToast('Invalid amount');
    portfolio.cash += amt; portfolio.transactions.unshift({ type: 'deposit', qty: amt, time: new Date().toLocaleTimeString(), symbol: 'USD' });
    savePortfolio(); updateSimUI(); renderMobileTradeSummary(); showToast('💰 Deposited $' + amt.toFixed(2));
}

function withdrawFunds() {
    const amt = parseFloat(document.getElementById('depositAmount')?.value);
    if (!amt || amt <= 0) return showToast('Invalid amount');
    if (portfolio.cash < amt) return showToast('Insufficient balance');
    portfolio.cash -= amt; portfolio.transactions.unshift({ type: 'withdraw', qty: amt, time: new Date().toLocaleTimeString(), symbol: 'USD' });
    savePortfolio(); updateSimUI(); renderMobileTradeSummary(); showToast('💸 Withdrawn $' + amt.toFixed(2));
}

function renderMobileHistory() {
    const panel = document.getElementById('historyPanel'); if (!panel) return;
    const transactions = portfolio.transactions || [];
    let html = '<div style="padding:10px;"><h4>Transaction History</h4>';
    if (transactions.length === 0) { html += '<div style="color:var(--text-muted);">No transactions</div>'; }
    else { html += '<ul style="list-style:none;padding:0;">'; transactions.slice(0, 30).forEach(t => { html += `<li style="padding:4px 0;border-bottom:1px solid var(--border-light);">${t.time} - <span style="color:${t.type==='buy'?'var(--success)':t.type==='sell'?'var(--danger)':'var(--mt5-blue)'};">${t.type.toUpperCase()}</span> ${t.qty} × ${t.symbol || 'USD'} @ $${t.price?.toFixed(2) || t.qty.toFixed(2)}</li>`; }); html += '</ul>'; }
    html += '</div>'; panel.innerHTML = html;
}

function placeSimOrderMobile(side, qty, sl, tp) {
    const symbol = simCurrentSymbol; let price = simLastPrices[symbol] || simBasePrices[symbol] || 150;
    if (!portfolio) portfolio = { cash: 100000, holdings: {}, transactions: [], drawnLines: {} };
    if (side === 'buy') {
        const cost = qty * price; if (portfolio.cash < cost) return showToast('Insufficient cash');
        portfolio.cash -= cost;
        if (portfolio.holdings[symbol]) { let h = portfolio.holdings[symbol]; if (h.qty < 0) { h.qty += qty; if (h.qty === 0) delete portfolio.holdings[symbol]; } else { const totalCost = qty * price; const newAvg = ((h.qty * h.avgPrice) + totalCost) / (h.qty + qty); h.qty += qty; h.avgPrice = newAvg; h.entryPrice = newAvg; } }
        else { portfolio.holdings[symbol] = { qty, avgPrice: price, currentPrice: price, entryPrice: price }; }
        if (sl && portfolio.holdings[symbol]) portfolio.holdings[symbol].slPrice = sl;
        if (tp && portfolio.holdings[symbol]) portfolio.holdings[symbol].tpPrice = tp;
        portfolio.transactions.unshift({ type: 'buy', symbol, qty, price, time: new Date().toLocaleTimeString() }); playTradeSound('buy');
    } else {
        if (portfolio.holdings[symbol] && portfolio.holdings[symbol].qty > 0) { let h = portfolio.holdings[symbol]; let closeQty = Math.min(h.qty, qty); portfolio.cash += closeQty * price; h.qty -= closeQty; if (h.qty === 0) delete portfolio.holdings[symbol]; }
        else { if (portfolio.holdings[symbol] && portfolio.holdings[symbol].qty < 0) { let h = portfolio.holdings[symbol]; const newAvg = ((Math.abs(h.qty) * h.avgPrice) + (qty * price)) / (Math.abs(h.qty) + qty); h.qty -= qty; h.avgPrice = newAvg; h.entryPrice = newAvg; } else { portfolio.holdings[symbol] = { qty: -qty, avgPrice: price, currentPrice: price, entryPrice: price }; } if (sl && portfolio.holdings[symbol]) portfolio.holdings[symbol].slPrice = sl; if (tp && portfolio.holdings[symbol]) portfolio.holdings[symbol].tpPrice = tp; }
        portfolio.transactions.unshift({ type: 'sell', symbol, qty, price, time: new Date().toLocaleTimeString() }); playTradeSound('sell');
    }
    savePortfolio(); updateSimUI(); updateMobileTopBar(); renderMobileTradeSummary(); showToast('Order executed: ' + side.toUpperCase() + ' ' + qty + ' ' + symbol + ' @ $' + price.toFixed(4));
}

function updateMobileTopBar() {
    const sellPriceEl = document.getElementById('mobileSellPrice'), buyPriceEl = document.getElementById('mobileBuyPrice');
    const price = simLastPrices[simCurrentSymbol] || simBasePrices[simCurrentSymbol] || 0;
    if (sellPriceEl) sellPriceEl.textContent = '$' + (price * 0.9999).toFixed(2);
    if (buyPriceEl) buyPriceEl.textContent = '$' + (price * 1.0001).toFixed(2);
}

function renderMobilePositions() { renderMobileTradeSummary(); }

function resetSimPortfolio() {
    if (confirm('Reset portfolio? All trades cleared.')) { portfolio = { cash: 100000, holdings: {}, transactions: [], drawnLines: {} }; simLastPrices = {}; activeIndicators = {}; simIndicatorSeries = {}; savePortfolio(); updateSimUI(); redrawAllLines(); showToast('🔄 Portfolio reset ($100,000)'); }
}
