            // ─── CHART INIT (RESILIENT) ─────────────────────────────────────
            async function initChart() {
                if (window._chartCleanup) window._chartCleanup();
                const chartDiv = document.getElementById('simChartContainer');
                const loadingEl = document.getElementById('chartLoading');
                if (!chartDiv) {
                    console.warn('Chart container not found, retrying...');
                    setTimeout(initChart, 300);
                    return;
                }

                // Ensure container has size
                let attempts = 0;
                while ((chartDiv.clientWidth === 0 || chartDiv.clientHeight === 0) && attempts < 15) {
                    await new Promise(r => setTimeout(r, 80));
                    attempts++;
                }
                if (chartDiv.clientWidth === 0 || chartDiv.clientHeight === 0) {
                    console.warn('Chart container still has 0 size, retrying...');
                    setTimeout(initChart, 300);
                    return;
                }
                if (typeof LightweightCharts === 'undefined') {
                    if (loadingEl) loadingEl.innerHTML = '<span style="color:var(--danger);">⚠️ Chart library not loaded.</span>';
                    return;
                }

                // Cleanup old chart
                if (simChart) {
                    try { simChart.remove(); } catch (e) {}
                    simChart = null;
                    simCandleSeries = null;
                    simVolumeSeries = null;
                    simIndicatorSeries = {};
                }
                chartDiv.querySelectorAll('canvas').forEach(c => c.remove());
                if (loadingEl) loadingEl.style.display = 'flex';

                // ── STEP 1: Fetch REAL price ──
                let realTimePrice = simLastPrices[simCurrentSymbol] || lastBinancePrice[simCurrentSymbol];
                if (!realTimePrice || isNaN(realTimePrice)) {
                    const fetchedPrice = await fetchBinancePrice(simCurrentSymbol);
                    if (fetchedPrice && fetchedPrice > 0) {
                        realTimePrice = fetchedPrice;
                        simLastPrices[simCurrentSymbol] = realTimePrice;
                        simBasePrices[simCurrentSymbol] = realTimePrice;
                    }
                }
                if (!realTimePrice || isNaN(realTimePrice)) {
                    realTimePrice = simBasePrices[simCurrentSymbol] || 45000;
                }

                // ── STEP 2: PRIMARY → Binance REST ──
                let candles = null;
                let sourceLabel = 'Simulation';
                let binanceData = await fetchBinanceCandles(simCurrentSymbol, '1m', 500);
                if (binanceData && binanceData.length > 0) {
                    candles = sanitizeCandleData(binanceData);
                    sourceLabel = 'Binance REST';
                    await saveCandlesToDB(simCurrentSymbol, currentTimeframe, candles);
                } else {
                    let dbCandles = await loadCandlesFromDB(simCurrentSymbol, currentTimeframe);
                    if (dbCandles && dbCandles.length > 0) {
                        candles = sanitizeCandleData(dbCandles);
                        sourceLabel = 'IndexedDB';
                    } else {
                        candles = sanitizeCandleData(generateSeamlessSimulatedCandles(simCurrentSymbol, 500,
                            realTimePrice, currentTimeframe));
                        sourceLabel = 'Simulation (Fallback)';
                        await saveCandlesToDB(simCurrentSymbol, currentTimeframe, candles);
                    }
                }

                // ── STEP 3: Merge latest ──
                let latestCandle = await fetchBinanceLatest(simCurrentSymbol);
                if (latestCandle && latestCandle.close) {
                    latestCandle = sanitizeCandle(latestCandle);
                    if (latestCandle) {
                        const exists = candles.some(c => c.time === latestCandle.time);
                        if (!exists) {
                            candles.push(latestCandle);
                            candles.sort((a, b) => a.time - b.time);
                        } else {
                            const idx = candles.findIndex(c => c.time === latestCandle.time);
                            if (idx !== -1) candles[idx] = latestCandle;
                        }
                        realTimePrice = latestCandle.close;
                        simLastPrices[simCurrentSymbol] = latestCandle.close;
                        simBasePrices[simCurrentSymbol] = latestCandle.close;
                        sourceLabel += ' + latest';
                    }
                }

                // ── STEP 4: Ensure last candle close matches price ──
                if (candles.length > 0) {
                    const lastCandle = candles[candles.length - 1];
                    if (isValidNumber(realTimePrice) && Math.abs(lastCandle.close - realTimePrice) > 0.0001) {
                        lastCandle.close = realTimePrice;
                        if (realTimePrice > lastCandle.high) lastCandle.high = realTimePrice;
                        if (realTimePrice < lastCandle.low) lastCandle.low = realTimePrice;
                    }
                }

                simAllCandles = sanitizeCandleData(candles);
                if (simAllCandles.length === 0) {
                    simAllCandles = sanitizeCandleData(generateSeamlessSimulatedCandles(simCurrentSymbol, 500,
                        realTimePrice, currentTimeframe));
                    sourceLabel = 'Simulation (Emergency)';
                }

                // ── STEP 5: Current candle ──
                const now = Math.floor(Date.now() / 1000);
                const currentMinute = now - (now % 60);
                const lastClose = simAllCandles.length > 0 ? simAllCandles[simAllCandles.length - 1].close :
                realTimePrice;
                simCurrentCandle = sanitizeCandle({
                    time: currentMinute,
                    open: lastClose,
                    high: lastClose,
                    low: lastClose,
                    close: lastClose,
                    volume: 0
                });
                if (isValidNumber(realTimePrice) && realTimePrice > 0) {
                    simCurrentCandle.open = lastClose;
                    simCurrentCandle.close = realTimePrice;
                    simCurrentCandle.high = Math.max(lastClose, realTimePrice);
                    simCurrentCandle.low = Math.min(lastClose, realTimePrice);
                }

                // ── STEP 6: Render ──
                const visible = initLazy(simAllCandles);
                const isMobile = window.innerWidth <= 768;
                const chartHeight = isMobile ? Math.max(140, chartDiv.clientHeight) : Math.max(220, chartDiv.clientHeight);
                const isDark = appTheme === 'dark';

                try {
                    const barSpacing = isMobile ? 2 : 4;
                    simChart = LightweightCharts.createChart(chartDiv, {
                        width: chartDiv.clientWidth,
                        height: chartHeight,
                        timeScale: {
                            timeVisible: true,
                            secondsVisible: currentTimeframe < 300,
                            rightOffset: isMobile ? 4 : 10,
                            barSpacing: barSpacing,
                            minBarSpacing: isMobile ? 1 : 2
                        },
                        layout: {
                            background: { type: 'solid', color: 'transparent' },
                            textColor: isDark ? '#94a3b8' : '#6b7280'
                        },
                        grid: { vertLines: { visible: false }, horzLines: { visible: false } },
                        crosshair: { mode: 1 },
                        rightPriceScale: { borderVisible: true, autoScale: true, scaleMargins: { top: 0.05,
                                bottom: 0.05 } },
                        handleScroll: { vertTouchDrag: false, horzTouchDrag: true },
                        handleScale: { axisPressedMouseMove: true, pinch: true },
                    });

                    simCandleSeries = simChart.addCandlestickSeries({
                        upColor: '#10b981',
                        downColor: '#ef4444',
                        borderUpColor: '#10b981',
                        borderDownColor: '#ef4444',
                        wickUpColor: '#10b981',
                        wickDownColor: '#ef4444'
                    });
                    simVolumeSeries = simChart.addHistogramSeries({ priceFormat: { type: 'volume' },
                        priceScaleId: '' });
                    if (showVolume) simChart.priceScale('').applyOptions({ scaleMargins: { top: 0.88,
                        bottom: 0 } });
                    else simChart.priceScale('').applyOptions({ scaleMargins: { top: 0, bottom: 0 } });

                    const allCandles = [...visible];
                    if (simCurrentCandle) allCandles.push(simCurrentCandle);
                    const safeAll = sanitizeCandleData(allCandles);
                    simCandleSeries.setData(safeAll);
                    updateAllIndicators();
                    const volData = visible.map(c => ({ time: c.time, value: c.volume || 0, color: c.close >= c
                            .open ? 'rgba(16,185,129,0.35)' : 'rgba(239,68,68,0.35)' }));
                    simVolumeSeries.setData(volData);

                    simChart.timeScale().fitContent();
                    const visibleRange = simChart.timeScale().getVisibleRange();
                    if (visibleRange) {
                        const rightEdge = visibleRange.to;
                        const leftEdge = visibleRange.from;
                        const rangeWidth = rightEdge - leftEdge;
                        const lastTime = simAllCandles.length > 0 ? simAllCandles[simAllCandles.length - 1].time :
                            Date.now() / 1000;
                        const newRight = lastTime + 60;
                        const newLeft = newRight - rangeWidth;
                        if (newLeft > 0) {
                            try { simChart.timeScale().setVisibleRange({ from: newLeft, to: newRight }); } catch (
                            e) {}
                        }
                    }

                    // ── STEP 7: Restore saved state ──
                    const savedInd = await loadIndicatorsFromDB();
                    if (savedInd && Object.keys(savedInd).length) {
                        activeIndicators = savedInd;
                        updateAllIndicators();
                        updateIndDropdownBtnState();
                    }
                    const savedDraw = await loadDrawingsFromDB(simCurrentSymbol);
                    if (savedDraw && savedDraw.length) {
                        if (!portfolio.drawnLines[simCurrentSymbol]) portfolio.drawnLines[simCurrentSymbol] = [];
                        portfolio.drawnLines[simCurrentSymbol] = savedDraw;
                        redrawAllLines();
                    }
                    const savedState = await loadChartStateFromDB(simCurrentSymbol);
                    if (savedState && savedState.zoom) {
                        try { simChart.timeScale().setVisibleRange(savedState.zoom); } catch (e) {}
                    }

                    // ── STEP 8: Drawing tools ──
                    simChart.subscribeClick(param => {
                        if (!currentDrawingTool || !param.point || !simCandleSeries) return;
                        if (param.point.y > 0 && param.point.y < chartDiv.clientHeight) {
                            const price = simCandleSeries.coordinateToPrice(param.point.y);
                            if (isValidNumber(price) && price > 0) {
                                let color, label;
                                if (currentDrawingTool === 'support') { color = '#10b981';
                                    label = 'Support'; } else if (currentDrawingTool === 'resistance') { color =
                                        '#ef4444';
                                    label = 'Resistance'; } else { color = '#3b82f6';
                                    label = 'H-Line'; }
                                if (!portfolio.drawnLines[simCurrentSymbol]) portfolio.drawnLines[
                                    simCurrentSymbol] = [];
                                portfolio.drawnLines[simCurrentSymbol].push({ price: +price.toFixed(4),
                                    color, label, style: 0 });
                                savePortfolioToStorage();
                                saveDrawingsToDB(simCurrentSymbol, portfolio.drawnLines[simCurrentSymbol]);
                                redrawAllLines();
                                showToast('📐 ' + label + ' at $' + price.toFixed(4));
                                currentDrawingTool = null;
                                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove(
                                    'active'));
                            }
                        }
                    });

                    // ── Drag lines ──
                    let dragStateLocal = null;
                    const mousedownHandler = (e) => {
                        if (!simCandleSeries || manualDrawnLines.length === 0) return;
                        const rect = chartDiv.getBoundingClientRect();
                        const y = (e.clientY || e.touches?.[0]?.clientY || 0) - rect.top;
                        const threshold = 14;
                        let closest = null,
                            closestDist = Infinity;
                        for (const ml of manualDrawnLines) {
                            if (!ml.lineObj) continue;
                            const lineY = simCandleSeries.priceToCoordinate(ml.price);
                            if (lineY !== null) {
                                const dist = Math.abs(y - lineY);
                                if (dist < threshold && dist < closestDist) { closest = ml;
                                    closestDist = dist; }
                            }
                        }
                        if (closest) {
                            dragStateLocal = { active: true, lineKey: closest.key, startPrice: closest.price,
                                currentPrice: closest.price, origIndex: closest.index };
                            chartDiv.classList.add('dragging-line');
                            e.preventDefault();
                        }
                    };
                    chartDiv.addEventListener('mousedown', mousedownHandler);
                    chartDiv.addEventListener('touchstart', mousedownHandler, { passive: false });

                    const moveHandler = (e) => {
                        if (!dragStateLocal || !dragStateLocal.active || !simCandleSeries) return;
                        const rect = chartDiv.getBoundingClientRect();
                        const y = (e.clientY || e.touches?.[0]?.clientY || 0) - rect.top;
                        const newPrice = simCandleSeries.coordinateToPrice(y);
                        if (isValidNumber(newPrice) && newPrice > 0) {
                            dragStateLocal.currentPrice = +newPrice.toFixed(4);
                            const ml = manualDrawnLines.find(m => m.key === dragStateLocal.lineKey);
                            if (ml && ml.lineObj) {
                                try { simCandleSeries.removePriceLine(ml.lineObj); } catch (e) {}
                                const newLine = simCandleSeries.createPriceLine({ price: dragStateLocal
                                        .currentPrice, color: ml.color, lineWidth: 2, lineStyle: ml
                                        .style || 0, axisLabelVisible: true, title: ml.label });
                                ml.lineObj = newLine;
                                allPriceLines[ml.key] = newLine;
                            }
                        }
                    };
                    document.addEventListener('mousemove', moveHandler);
                    document.addEventListener('touchmove', moveHandler, { passive: false });

                    const upHandler = () => {
                        if (dragStateLocal && dragStateLocal.active) {
                            if (dragStateLocal.currentPrice !== dragStateLocal.startPrice) {
                                const idx = dragStateLocal.origIndex;
                                if (idx >= 0 && idx < (portfolio.drawnLines[simCurrentSymbol] || [])
                                    .length) {
                                    portfolio.drawnLines[simCurrentSymbol][idx].price = dragStateLocal
                                        .currentPrice;
                                    savePortfolioToStorage();
                                    saveDrawingsToDB(simCurrentSymbol, portfolio.drawnLines[
                                        simCurrentSymbol]);
                                    redrawAllLines();
                                    showToast('📐 Line moved to $' + dragStateLocal.currentPrice
                                        .toFixed(4));
                                }
                            }
                            dragStateLocal = null;
                            chartDiv.classList.remove('dragging-line');
                        }
                    };
                    document.addEventListener('mouseup', upHandler);
                    document.addEventListener('touchend', upHandler);

                    simChart.timeScale().subscribeVisibleTimeRangeChange(range => {
                        if (range) {
                            saveChartStateToDB(simCurrentSymbol, { zoom: range });
                        }
                    });

                    if (loadingEl) loadingEl.style.display = 'none';
                    redrawAllLines();

                    // ── STEP 9: Price update interval ──
                    if (simPriceIntervalId) clearInterval(simPriceIntervalId);
                    simPriceIntervalId = setInterval(() => {
                        if (!simCurrentCandle || !simCandleSeries) return;
                        let price = simLastPrices[simCurrentSymbol];
                        if (!isValidNumber(price)) {
                            const vol = simVolatility[simCurrentSymbol] || 0.0015;
                            const change = (simCurrentCandle.close || 100) * vol * (Math.random() - 0.48) *
                                0.8;
                            price = (simCurrentCandle.close || 100) + change;
                            price = +price.toFixed(4);
                            simLastPrices[simCurrentSymbol] = price;
                        }
                        if (!isValidNumber(price)) {
                            price = simCurrentCandle.close || simBasePrices[simCurrentSymbol] || 100;
                        }
                        simCurrentCandle.high = Math.max(simCurrentCandle.high || price, price);
                        simCurrentCandle.low = Math.min(simCurrentCandle.low || price, price);
                        simCurrentCandle.close = price;
                        simCurrentCandle.volume = (simCurrentCandle.volume || 0) + Math.floor(500 + Math
                        .random() * 3000);
                        try { simCandleSeries.update(simCurrentCandle); } catch (e) { console.warn(
                                'Price update error:', e); }
                        updateAllIndicators();
                        checkAndExecuteSLTP();
                        updateSimUI();
                        updateMobileTopBar();
                        updateQuotesBar();
                        checkPendingOrders();
                    }, 1000);

                    // ── STEP 10: Candle close interval ──
                    if (simCandleCloseIntervalId) clearInterval(simCandleCloseIntervalId);
                    simCandleCloseIntervalId = setInterval(() => {
                        if (!simCurrentCandle || !simCandleSeries) return;
                        const now2 = Math.floor(Date.now() / 1000);
                        const currentMinute2 = now2 - (now2 % 60);
                        if (simCurrentCandle.time < currentMinute2) {
                            const closedCandle = sanitizeCandle({ ...simCurrentCandle });
                            if (closedCandle) {
                                simAllCandles.push(closedCandle);
                                if (simAllCandles.length > 10000) simAllCandles = simAllCandles.slice(
                                    -10000);
                                saveCandlesToDB(simCurrentSymbol, currentTimeframe, simAllCandles);
                            }
                            const newOpen = simCurrentCandle.close;
                            const newCandle = sanitizeCandle({
                                time: currentMinute2,
                                open: newOpen,
                                high: newOpen,
                                low: newOpen,
                                close: newOpen,
                                volume: 0
                            });
                            if (newCandle) {
                                simCurrentCandle = newCandle;
                                try { simCandleSeries.update(simCurrentCandle); } catch (e) { console.warn(
                                        'Candle close update error:', e); }
                                updateAllIndicators();
                            }
                        }
                    }, 10000);

                    const debouncedResize = debounce(() => {
                        if (simChart && chartDiv.clientWidth > 0 && chartDiv.clientHeight > 0) {
                            try { simChart.applyOptions({ width: chartDiv.clientWidth, height: chartDiv
                                    .clientHeight }); } catch (e) { console.warn('Resize error:', e); }
                            try {
                                const vr = simChart.timeScale().getVisibleRange();
                                if (vr && simAllCandles.length > 0) {
                                    const last = simAllCandles[simAllCandles.length - 1].time;
                                    const right = vr.to;
                                    if (last > right - 60) {
                                        const width = vr.to - vr.from;
                                        simChart.timeScale().setVisibleRange({ from: vr.from, to: last +
                                            60 });
                                    }
                                }
                            } catch (e) {}
                        }
                    }, 150);
                    if (simResizeObserver) simResizeObserver.disconnect();
                    simResizeObserver = new ResizeObserver(debouncedResize);
                    simResizeObserver.observe(chartDiv);

                    window._chartCleanup = function() {
                        document.removeEventListener('mousemove', moveHandler);
                        document.removeEventListener('touchmove', moveHandler);
                        document.removeEventListener('mouseup', upHandler);
                        document.removeEventListener('touchend', upHandler);
                        chartDiv.removeEventListener('mousedown', mousedownHandler);
                        chartDiv.removeEventListener('touchstart', mousedownHandler);
                        if (simPriceIntervalId) clearInterval(simPriceIntervalId);
                        if (simCandleCloseIntervalId) clearInterval(simCandleCloseIntervalId);
                        if (simResizeObserver) simResizeObserver.disconnect();
                        if (simChart) { try { simChart.remove(); } catch (e) {}
                            simChart = null; }
                    };

                    document.getElementById('cronStatus').textContent = sourceLabel;
                    document.getElementById('candleCount').textContent = simAllCandles.length;
                    updateDebugPanel();

                    // ── STEP 11: Visibility change (FIX: chart disappearing) ──
                    if (chartVisibilityHandler) document.removeEventListener('visibilitychange',
                    chartVisibilityHandler);
                    chartVisibilityHandler = () => {
                        if (document.visibilityState === 'visible') {
                            if (simChart && chartDiv) {
                                setTimeout(() => {
                                    if (chartDiv.clientWidth > 0 && chartDiv.clientHeight > 0) {
                                        try { simChart.applyOptions({ width: chartDiv.clientWidth,
                                                height: chartDiv.clientHeight }); } catch (e) {}
                                        try { simChart.timeScale().fitContent(); } catch (e) {}
                                        try { const r = simChart.timeScale().getVisibleRange(); if (r)
                                                simChart.timeScale().setVisibleRange(r); } catch (e) {}
                                    } else {
                                        console.warn('Chart container lost size, re-initializing...');
                                        resetChart();
                                    }
                                }, 120);
                            } else {
                                resetChart();
                            }
                        }
                    };
                    document.addEventListener('visibilitychange', chartVisibilityHandler);

                } catch (err) {
                    console.error('Chart init error:', err);
                    if (loadingEl) loadingEl.innerHTML =
                        '<span style="color:var(--danger);">⚠️ Chart error: ' + err.message + '</span>';
                    if (simChart) { try { simChart.remove(); } catch (e) {}
                        simChart = null; }
                    if (chartInitRetryTimer) clearTimeout(chartInitRetryTimer);
                    chartInitRetryTimer = setTimeout(() => { initChart(); }, 2000);
                }
            }

            // ─── REDRAW LINES (Entry, SL, TP) ──────────────────────────────
            function redrawAllLines() {
                if (!simCandleSeries) return;
                Object.values(allPriceLines).forEach(line => { try { simCandleSeries.removePriceLine(line); } catch (e) {} });
                allPriceLines = {};
                manualDrawnLines = [];

                const symbolLines = (portfolio.drawnLines && portfolio.drawnLines[simCurrentSymbol]) || [];
                symbolLines.forEach((l, idx) => {
                    const line = simCandleSeries.createPriceLine({ price: l.price, color: l.color || '#3b82f6',
                        lineWidth: 2, lineStyle: l.style || 0, axisLabelVisible: true, title: l.label || '' });
                    const key = 'manual_' + idx;
                    allPriceLines[key] = line;
                    manualDrawnLines.push({ key, price: l.price, color: l.color, label: l.label, style: l.style,
                        lineObj: line, index: idx });
                });

                // ── ENTRY, SL, TP lines per position ──
                portfolio.positions.forEach(p => {
                    if (p.symbol === simCurrentSymbol && p.entryPrice) {
                        const line = simCandleSeries.createPriceLine({
                            price: p.entryPrice,
                            color: '#3b82f6',
                            lineWidth: 1.5,
                            lineStyle: 0,
                            axisLabelVisible: true,
                            title: 'Entry ' + p.symbol + ' ' + p.id.slice(-4)
                        });
                        allPriceLines['entry_' + p.id] = line;
                    }
                    if (p.symbol === simCurrentSymbol && p.slPrice) {
                        const line = simCandleSeries.createPriceLine({
                            price: p.slPrice,
                            color: '#f59e0b',
                            lineWidth: 1.5,
                            lineStyle: 2,
                            axisLabelVisible: true,
                            title: 'SL ' + p.symbol
                        });
                        allPriceLines['sl_' + p.id] = line;
                    }
                    if (p.symbol === simCurrentSymbol && p.tpPrice) {
                        const line = simCandleSeries.createPriceLine({
                            price: p.tpPrice,
                            color: '#8b5cf6',
                            lineWidth: 1.5,
                            lineStyle: 2,
                            axisLabelVisible: true,
                            title: 'TP ' + p.symbol
                        });
                        allPriceLines['tp_' + p.id] = line;
                    }
                });
                updateLineManagerUI();
            }

            function deleteSingleLine(idx) {
                if (!portfolio.drawnLines[simCurrentSymbol]) return;
                portfolio.drawnLines[simCurrentSymbol].splice(idx, 1);
                savePortfolioToStorage();
                saveDrawingsToDB(simCurrentSymbol, portfolio.drawnLines[simCurrentSymbol]);
                redrawAllLines();
                showToast('🗑 Line deleted');
            }

            function updateLineManagerUI() {
                const el = document.getElementById('lineManagerList');
                if (!el) return;
                const lines = portfolio.drawnLines[simCurrentSymbol] || [];
                if (lines.length === 0) { el.innerHTML =
                        '<span style="color:var(--text-muted);font-size:0.5rem;">No lines</span>'; return; }
                el.innerHTML = lines.map((l, i) =>
                    `<div class="line-manager-row"><span class="line-dot" style="background:${l.color || '#3b82f6'};"></span><span style="flex:1;font-size:0.5rem;">${l.label || 'Line'} — $${l.price.toFixed(4)}</span><button class="line-delete-btn" onclick="deleteSingleLine(${i})" title="Delete">×</button></div>`
                ).join('');
            }

            function setDrawingTool(tool, btnId) {
                currentDrawingTool = tool;
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                if (btnId) document.getElementById(btnId)?.classList.add('active');
                showToast('📐 Click chart to draw ' + (tool === 'support' ? 'Support' : tool === 'resistance' ?
                    'Resistance' : 'Horizontal line'));
            }

            // ─── TRADING ENGINE (SL/TP + HEDGING) ───────────────────────────
            function checkAndExecuteSLTP() {
                if (!portfolio || !portfolio.positions) return;
                let changed = false;
                const toRemove = [];
                for (let i = 0; i < portfolio.positions.length; i++) {
                    const p = portfolio.positions[i];
                    const price = simLastPrices[p.symbol] || p.currentPrice || p.entryPrice;
                    if (!isValidNumber(price) || price <= 0) continue;
                    p.currentPrice = price;
                    const isShort = p.type === 'short';
                    let triggered = false;
                    let reason = '';
                    if (p.slPrice) {
                        if ((!isShort && price <= p.slPrice) || (isShort && price >= p.slPrice)) {
                            triggered = true;
                            reason = 'Stop Loss';
                        }
                    }
                    if (!triggered && p.tpPrice) {
                        if ((!isShort && price >= p.tpPrice) || (isShort && price <= p.tpPrice)) {
                            triggered = true;
                            reason = 'Take Profit';
                        }
                    }
                    if (triggered) {
                        const pnl = isShort ? (p.entryPrice - price) * p.qty : (price - p.entryPrice) * p.qty;
                        const fee = Math.abs(p.qty * price * 0.0005);
                        portfolio.cash += (isShort ? p.qty * p.entryPrice : p.qty * price) - fee;
                        const tx = {
                            type: 'close',
                            symbol: p.symbol,
                            qty: p.qty,
                            price,
                            time: new Date().toLocaleTimeString(),
                            reason,
                            pnl: pnl - fee,
                            id: p.id
                        };
                        portfolio.transactions.unshift(tx);
                        sendNotification('🛑 ' + reason, p.symbol + ' @ $' + price.toFixed(4) + ' | P&L: ' + (pnl -
                            fee).toFixed(2), pnl - fee >= 0 ? 'success' : 'error');
                        playTradeSound('sell');
                        toRemove.push(i);
                        changed = true;
                    }
                }
                if (changed) {
                    portfolio.positions = portfolio.positions.filter((_, i) => !toRemove.includes(i));
                    savePortfolioToStorage();
                    updateSimUI();
                    redrawAllLines();
                    syncPortfolioToServer();
                }
            }

            // ─── PENDING ORDERS CHECK ──────────────────────────────────────
            function checkPendingOrders() {
                if (pendingOrders.length === 0) return;
                const now = Date.now();
                const toRemove = [];
                for (let i = 0; i < pendingOrders.length; i++) {
                    const order = pendingOrders[i];
                    if (order.status !== 'pending') { toRemove.push(i); continue; }
                    const price = simLastPrices[order.symbol] || simBasePrices[order.symbol];
                    if (!isValidNumber(price)) continue;
                    const hit = order.side === 'buy' ? price <= order.price : price >= order.price;
                    if (hit) {
                        const qty = order.qty;
                        const execPrice = order.price;
                        const fee = qty * execPrice * 0.0005;
                        if (order.side === 'buy') {
                            if (portfolio.cash < qty * execPrice + fee) {
                                sendNotification('⚠️ Insufficient cash', 'Limit order ' + order.symbol + ' canceled',
                                    'warning');
                                order.status = 'canceled';
                                toRemove.push(i);
                                continue;
                            }
                            portfolio.cash -= qty * execPrice + fee;
                            portfolio.positions.push({
                                id: 'pos_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                                symbol: order.symbol,
                                type: 'long',
                                qty,
                                entryPrice: execPrice,
                                currentPrice: execPrice,
                                slPrice: null,
                                tpPrice: null,
                                openTime: new Date().toISOString(),
                                fee
                            });
                            portfolio.transactions.unshift({
                                type: 'buy',
                                symbol: order.symbol,
                                qty,
                                price: execPrice,
                                time: new Date().toLocaleTimeString(),
                                reason: 'Limit Order',
                                id: order.id,
                                fee
                            });
                            sendNotification('✅ Limit BUY Executed', order.symbol + ' @ $' + execPrice.toFixed(4),
                                'success');
                            playTradeSound('buy');
                        } else {
                            const margin = qty * execPrice * 0.5;
                            if (portfolio.cash < margin + fee) {
                                sendNotification('⚠️ Insufficient margin', 'Short limit order ' + order.symbol +
                                    ' canceled', 'warning');
                                order.status = 'canceled';
                                toRemove.push(i);
                                continue;
                            }
                            portfolio.cash -= fee;
                            const newPos = {
                                id: 'pos_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                                symbol: order.symbol,
                                type: 'short',
                                qty,
                                entryPrice: execPrice,
                                currentPrice: execPrice,
                                slPrice: null,
                                tpPrice: null,
                                openTime: new Date().toISOString(),
                                fee
                            };
                            portfolio.positions.push(newPos);
                            portfolio.transactions.unshift({
                                type: 'sell',
                                symbol: order.symbol,
                                qty,
                                price: execPrice,
                                time: new Date().toLocaleTimeString(),
                                reason: 'Limit Order (Short)',
                                id: order.id,
                                fee
                            });
                            sendNotification('✅ Limit SHORT Executed', order.symbol + ' @ $' + execPrice.toFixed(
                                4), 'success');
                            playTradeSound('sell');
                        }
                        order.status = 'filled';
                        toRemove.push(i);
                        savePortfolioToStorage();
                        updateSimUI();
                        redrawAllLines();
                        syncPortfolioToServer();
                    }
                }
                if (toRemove.length) {
                    pendingOrders = pendingOrders.filter((_, i) => !toRemove.includes(i));
                    savePendingOrders();
                    renderPendingOrdersUI();
                }
            }

            // ─── PLACE ORDER (Market + Limit) ──────────────────────────────
            function placeSimOrder(type, orderType = 'market', limitPrice = null) {
                const symbol = document.getElementById('simSymbolSelect')?.value || simCurrentSymbol;
                const qty = parseFloat(document.getElementById('simQty')?.value) || 0.01;
                if (!qty || qty <= 0) return showToast('❌ Invalid quantity');
                let price = simLastPrices[symbol] || simBasePrices[symbol] || 150;
                if (!isValidNumber(price)) price = 150;

                if (orderType === 'limit') {
                    if (!limitPrice || limitPrice <= 0) return showToast('❌ Invalid limit price');
                    const order = {
                        id: 'limit_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                        symbol,
                        side: type,
                        type: 'limit',
                        price: limitPrice,
                        qty,
                        status: 'pending',
                        createdAt: Date.now()
                    };
                    pendingOrders.push(order);
                    savePendingOrders();
                    renderPendingOrdersUI();
                    sendNotification('📌 Limit Order Placed', type.toUpperCase() + ' ' + qty + ' ' + symbol + ' @ $' +
                        limitPrice.toFixed(4), 'info');
                    showToast('📌 Limit ' + type.toUpperCase() + ' placed @ $' + limitPrice.toFixed(4));
                    return;
                }

                // ─── MARKET ORDER ──────────────────────────────────────────
                const fee = qty * price * 0.0005;
                if (type === 'buy') {
                    if (portfolio.cash < qty * price + fee) return showToast('❌ Insufficient cash');
                    portfolio.cash -= qty * price + fee;
                    portfolio.positions.push({
                        id: 'pos_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                        symbol,
                        type: 'long',
                        qty,
                        entryPrice: price,
                        currentPrice: price,
                        slPrice: null,
                        tpPrice: null,
                        openTime: new Date().toISOString(),
                        fee
                    });
                    portfolio.transactions.unshift({
                        type: 'buy',
                        symbol,
                        qty,
                        price,
                        time: new Date().toLocaleTimeString(),
                        reason: 'Market Order',
                        fee
                    });
                    sendNotification('✅ Market BUY', qty + ' ' + symbol + ' @ $' + price.toFixed(4), 'success');
                    playTradeSound('buy');
                    showToast('✅ Market BUY ' + qty + ' ' + symbol + ' @ $' + price.toFixed(4));
                } else {
                    const margin = qty * price * 0.5;
                    if (portfolio.cash < margin + fee) return showToast('❌ Insufficient margin for short');
                    portfolio.cash -= fee;
                    portfolio.positions.push({
                        id: 'pos_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                        symbol,
                        type: 'short',
                        qty,
                        entryPrice: price,
                        currentPrice: price,
                        slPrice: null,
                        tpPrice: null,
                        openTime: new Date().toISOString(),
                        fee
                    });
                    portfolio.transactions.unshift({
                        type: 'sell',
                        symbol,
                        qty,
                        price,
                        time: new Date().toLocaleTimeString(),
                        reason: 'Market Order (Short)',
                        fee
                    });
                    sendNotification('✅ Market SHORT', qty + ' ' + symbol + ' @ $' + price.toFixed(4), 'success');
                    playTradeSound('sell');
                    showToast('✅ Market SHORT ' + qty + ' ' + symbol + ' @ $' + price.toFixed(4));
                }
                savePortfolioToStorage();
                updateSimUI();
                redrawAllLines();
                syncPortfolioToServer();
            }

            // ─── EXIT POSITION ──────────────────────────────────────────────
            function exitPositionById(posId) {
                const idx = portfolio.positions.findIndex(p => p.id === posId);
                if (idx === -1) return;
                const p = portfolio.positions[idx];
                const price = simLastPrices[p.symbol] || p.currentPrice || p.entryPrice || 0;
                const isShort = p.type === 'short';
                const pnl = isShort ? (p.entryPrice - price) * p.qty : (price - p.entryPrice) * p.qty;
                const fee = Math.abs(p.qty * price * 0.0005);
                portfolio.cash += (isShort ? p.qty * p.entryPrice : p.qty * price) - fee;
                portfolio.transactions.unshift({
                    type: 'close',
                    symbol: p.symbol,
                    qty: p.qty,
                    price,
                    time: new Date().toLocaleTimeString(),
                    reason: 'Manual Exit',
                    pnl: pnl - fee,
                    id: p.id
                });
                portfolio.positions.splice(idx, 1);
                savePortfolioToStorage();
                updateSimUI();
                redrawAllLines();
                syncPortfolioToServer();
                sendNotification('🚪 Position Closed', p.symbol + ' @ $' + price.toFixed(4) + ' | P&L: ' + (pnl - fee)
                    .toFixed(2), pnl - fee >= 0 ? 'success' : 'error');
                playTradeSound('sell');
                showToast('🚪 Exited ' + p.symbol + ' @ $' + price.toFixed(4) + ' | P&L: ' + (pnl - fee).toFixed(2));
                document.querySelectorAll('.modal').forEach(m => m.remove());
            }

            function exitPosition(symbol) {

                if (!confirm('⚠️ Close ALL open positions?')) return;
                const toClose = [...portfolio.positions];

                    const isShort = p.type === 'short';
                    const pnl = isShort ? (p.entryPrice - price) * p.qty : (price - p.entryPrice) * p.qty;

                const panel = document.getElementById('quotesPanel');
                if (!panel) return;
                const list = mobileWatchlist.length ? mobileWatchlist : SYMBOLS;
                const filtered = query ? list.filter(s => s.toLowerCase().includes(query.toLowerCase())) : list;
                panel.innerHTML =
                    `<div class="mobile-search" style="padding:2px 0;"><input type="text" id="watchlistSearch" placeholder="Search symbol..." style="width:100%;background:var(--mt5-input);border:1px solid var(--mt5-border);color:var(--mt5-text-bright);padding:3px 6px;border-radius:4px;font-size:0.6rem;" value="${query}" oninput="window.watchlistSearch(this.value)"></div>` +
                    filtered.map(sym => {
                        const price = simLastPrices[sym] || simBasePrices[sym] || '-';
                        const change = (Math.random() * 4 - 2);
                        const cls = change >= 0 ? 'up' : 'down';
                        return `<div class="watchlist-item" onclick="selectMobileSymbol('${sym}')">
                            <span class="sym">${sym}</span>
                            <span class="price">$${typeof price === 'number' ? price.toFixed(4) : price}</span>
                            <span class="change ${cls}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</span>
                        </div>`;
                    }).join('');
            };

            function selectMobileSymbol(sym) {
                if (sym === simCurrentSymbol) return;
                simCurrentSymbol = sym;
                cleanupSimIntervals();
                simAllCandles = [];
                simCurrentCandle = null;
                activeIndicators = {};
                simIndicatorSeries = {};
                document.querySelector('.mt5-symbol').textContent = sym;
                document.querySelector('.mt5-pair').textContent = sym;
                document.querySelector('.mt5-name').textContent = sym + ' / USD';
                updateMobileTopBar();
                initChart();
                document.querySelector('.mt5-nav-item[data-panel="chart"]')?.click();
                document.querySelectorAll('.watchlist-item').forEach(el => {
                    el.style.borderColor = 'var(--mt5-border)';
                    if (el.querySelector('.sym')?.textContent === sym) {
                        el.style.borderColor = 'var(--mt5-green)';
                    }
                });
                document.querySelectorAll('.quote-item').forEach(el => {
                    el.classList.toggle('active', el.dataset.symbol === sym);
                });
                showToast('📊 Switched to ' + sym);
            }

            function renderMobileHistory() {
                const panel = document.getElementById('historyPanel');
                if (!panel) return;
                const transactions = portfolio.transactions || [];
                let html =
                    '<div style="padding:3px 0;"><h4 style="color:var(--mt5-text-bright);font-size:0.75rem;">Transaction History</h4>';
                if (transactions.length === 0) {
                    html += '<div style="color:var(--mt5-text);padding:8px 0;font-size:0.6rem;">No transactions</div>';
                } else {
                    transactions.slice(0, 30).forEach(t => {
                        const typeCls = t.type === 'buy' ? 'buy' : t.type === 'sell' ? 'sell' : t.type ===
                            'deposit' ? 'deposit' : 'withdraw';
                        const isDeposit = t.type === 'deposit';
                        const isWithdraw = t.type === 'withdraw';
                        const sign = (isDeposit || t.type === 'buy' || t.type === 'deposit') ? '+' : '-';
                        const color = isDeposit ? 'green' : isWithdraw ? 'red' : t.type === 'buy' ? 'green' :
                            'red';
                        const pnlText = t.pnl !== undefined ? ' | P&L: ' + (t.pnl >= 0 ? '+' : '') + t.pnl
                            .toFixed(2) : '';
                        html += `<div class="history-item">
                            <div class="left">
                                <span class="type ${typeCls}">${t.type.toUpperCase()} ${t.reason ? '('+t.reason+')' : ''}</span>
                                <span class="detail">${t.symbol || 'USD'} • ${t.time || ''}</span>
                            </div>
                            <div class="right ${color}">${sign}$${(t.qty * (t.price || 1)).toFixed(2)}${pnlText}</div>
                        </div>`;
                    });
                }
                html += '</div>';
                panel.innerHTML = html;
            }

            // ─── CLEANUP ──────────────────────────────────────────────────────
            function cleanupSimIntervals() {
                if (simPriceIntervalId) clearInterval(simPriceIntervalId);
                if (simCandleCloseIntervalId) clearInterval(simCandleCloseIntervalId);
                if (simResizeObserver) simResizeObserver.disconnect();
                if (window._mobileResizeObs) { window._mobileResizeObs.disconnect();
                    window._mobileResizeObs = null; }
                if (chartInitRetryTimer) clearTimeout(chartInitRetryTimer);
                if (chartVisibilityHandler) { document.removeEventListener('visibilitychange',
                        chartVisibilityHandler);
                    chartVisibilityHandler = null; }
                if (window._visibilityHandler) document.removeEventListener('visibilitychange', window
                    ._visibilityHandler);
                simPriceIntervalId = null;
                simCandleCloseIntervalId = null;
                simResizeObserver = null;
                chartInitRetryTimer = null;
                if (window._chartCleanup) window._chartCleanup();
                stopBackgroundEngine();
            }

            function resetChart() {
                cleanupSimIntervals();
                if (simChart) {
                    try { simChart.remove(); } catch (e) {}
                    simChart = null;
                    simCandleSeries = null;
                    simVolumeSeries = null;
                    simIndicatorSeries = {};
                }
                simAllCandles = [];
                simCurrentCandle = null;
                activeIndicators = {};
                simIndicatorSeries = {};
                currentDrawingTool = null;
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                const chartDiv = document.getElementById('simChartContainer');
                if (chartDiv) {
                    chartDiv.innerHTML = '<div class="chart-loading" id="chartLoading">Loading chart...</div>';
                }
                if (chartInitRetryTimer) clearTimeout(chartInitRetryTimer);
                chartInitRetryTimer = setTimeout(initChart, 100);
            }

            // ─── BACKGROUND ENGINE ──────────────────────────────────────────
            let bgEngineInterval = null;

            function startBackgroundEngine() {
                if (bgEngineInterval) clearInterval(bgEngineInterval);
                bgEngineInterval = setInterval(() => {
                    checkAndExecuteSLTP();
                    checkPendingOrders();
                }, 3000);
            }

            function stopBackgroundEngine() {
                if (bgEngineInterval) { clearInterval(bgEngineInterval);
                    bgEngineInterval = null; }
            }

            // ─── SERVER SYNC ─────────────────────────────────────────────────
            async function syncPortfolioToServer() {
                if (!token) return;
                try {
                    await apiFetch('/portfolio', {
                        method: 'PUT',
                        body: JSON.stringify({
                            cash: portfolio.cash,
                            positions: portfolio.positions.slice(-50),
                            transactions: portfolio.transactions.slice(-50),
                            drawnLines: portfolio.drawnLines
                        })
                    });
                } catch (e) { console.warn('Portfolio sync error:', e.message); }
            }

            // ─── UI UPDATES ──────────────────────────────────────────────────
            function calcEquity() {
                let eq = portfolio.cash || 0;
                portfolio.positions.forEach(p => {
                    const cp = simLastPrices[p.symbol] || p.currentPrice || p.entryPrice || 0;
                    eq += Math.abs(p.qty) * cp;
                });
                return eq;
            }

            function calcTotalPL() {
                let pl = 0;
                portfolio.positions.forEach(p => {
                    const cp = simLastPrices[p.symbol] || p.currentPrice || p.entryPrice || 0;
                    pl += p.type === 'long' ? (cp - p.entryPrice) * p.qty : (p.entryPrice - cp) * p.qty;
                });
                return pl;
            }

            function updateSimUI() {
                if (!portfolio) return;
                const totalPL = calcTotalPL();
                const totalEquity = calcEquity();
                const cashEl = document.getElementById('simCash');
                const totalEl = document.getElementById('simTotalValue');
                const plEl = document.getElementById('simPL');
                const accEl = document.querySelectorAll('.account-no');
                if (cashEl) cashEl.textContent = '💰 $' + (portfolio.cash || 0).toFixed(2);
                if (totalEl) totalEl.textContent = '📊 $' + totalEquity.toFixed(2);
                if (plEl) {
                    plEl.textContent = (totalPL >= 0 ? '📈 +$' : '📉 -$') + Math.abs(totalPL).toFixed(2);
                    plEl.style.color = totalPL >= 0 ? 'var(--success)' : 'var(--danger)';
                }
                accEl.forEach(el => { el.textContent = userAccountNo; });

                // Update bottom panel positions
                renderBottomPanelPositions();
                renderBottomPanelHistory();

                // Update compact top bar stats
                const statCash = document.getElementById('statCash');
                const statEquity = document.getElementById('statEquity');
                const statPL = document.getElementById('statPL');
                if (statCash) statCash.textContent = '$' + (portfolio.cash || 0).toFixed(2);
                if (statEquity) statEquity.textContent = '$' + totalEquity.toFixed(2);
                if (statPL) {
                    statPL.textContent = (totalPL >= 0 ? '+' : '') + '$' + totalPL.toFixed(2);
                    statPL.style.color = totalPL >= 0 ? 'var(--success)' : 'var(--danger)';
                }

                savePortfolioToStorage();
                if (window.innerWidth <= 768) { renderMobileTradeSummary();
                    updateMobileTopBar(); }
                renderPendingOrdersUI();
                updateQuotesBar();
            }

            // ─── BOTTOM PANEL ──────────────────────────────────────────────
            let bottomPanelTab = 'positions';

            function renderBottomPanelPositions() {
                const container = document.getElementById('bpPositions');
                if (!container) return;
                if (portfolio.positions.length === 0) {
                    container.innerHTML = '<div class="empty-msg">No open positions</div>';
                    return;
                }
                let html = '';
                portfolio.positions.forEach(p => {
                    const cp = simLastPrices[p.symbol] || p.currentPrice || p.entryPrice || 0;
                    const pl = p.type === 'long' ? (cp - p.entryPrice) * p.qty : (p.entryPrice - cp) * p
                    .qty;
                    html += `<div class="pos-row">
                        <span><strong>${p.symbol}</strong> ${p.type.toUpperCase()} ${Math.abs(p.qty)} @ $${p.entryPrice.toFixed(4)}</span>
                        <span style="color:${pl>=0?'var(--success)':'var(--danger)'};">${pl>=0?'+':''}$${pl.toFixed(2)}</span>
                        <div class="pos-actions">
                            <button style="background:var(--danger);color:#fff;" onclick="exitPositionById('${p.id}')">Exit</button>
                            <button style="background:var(--accent);color:#fff;" onclick="editSLTPById('${p.id}')">SL/TP</button>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
            }

            function renderBottomPanelHistory() {
                const container = document.getElementById('bpHistory');
                if (!container) return;
                const tx = portfolio.transactions || [];
                if (tx.length === 0) {
                    container.innerHTML = '<div class="empty-msg">No transactions yet</div>';
                    return;
                }
                let html = '';
                tx.slice(0, 15).forEach(t => {
                    const pnlStr = t.pnl !== undefined ? ' | ' + (t.pnl >= 0 ? '+' : '') + t.pnl.toFixed(2) :
                        '';
                    const color = t.type === 'buy' ? 'var(--mt5-green)' : t.type === 'sell' ?
                        'var(--mt5-red)' : t.type === 'deposit' ? 'var(--mt5-blue)' :
                        'var(--mt5-red)';
                    html += `<div class="pos-row" style="font-size:0.45rem;">
                        <span>${t.time || ''} <span style="color:${color};">${t.type.toUpperCase()}</span> ${t.qty} ${t.symbol || ''} @ $${(t.price||1).toFixed(4)}${pnlStr}</span>
                    </div>`;
                });
                container.innerHTML = html;
            }

            function switchBottomTab(tab) {
                bottomPanelTab = tab;
                document.querySelectorAll('.bp-tabs button').forEach(b => b.classList.remove('active'));
                const btn = document.querySelector(`.bp-tabs button[data-tab="${tab}"]`);
                if (btn) btn.classList.add('active');
                document.getElementById('bpPositions').style.display = tab === 'positions' ? 'block' : 'none';
                document.getElementById('bpHistory').style.display = tab === 'history' ? 'block' : 'none';
                document.getElementById('bpPending').style.display = tab === 'pending' ? 'block' : 'none';
                if (tab === 'positions') renderBottomPanelPositions();
                if (tab === 'history') renderBottomPanelHistory();
                if (tab === 'pending') renderBottomPanelPending();
            }

            function renderBottomPanelPending() {
                const container = document.getElementById('bpPending');
                if (!container) return;
                const pending = pendingOrders.filter(o => o.status === 'pending');
                if (pending.length === 0) {
                    container.innerHTML = '<div class="empty-msg">No pending orders</div>';
                    return;
                }
                let html = '';
                pending.forEach(o => {
                    html += `<div class="pos-row">
                        <span>${o.symbol} ${o.side.toUpperCase()} ${o.qty} @ $${o.price.toFixed(4)}</span>
                        <button style="background:var(--danger);color:#fff;font-size:0.4rem;padding:1px 4px;border:none;border-radius:3px;cursor:pointer;" onclick="cancelLimitOrder('${o.id}');renderBottomPanelPending();">Cancel</button>
                    </div>`;
                });
                container.innerHTML = html;
            }

            // ─── RENDER TRADING TERMINAL ─────────────────────────────────────
            function renderTradingTerminal() {
                const isMobile = window.innerWidth <= 768;
                document.getElementById('app').innerHTML = `
                    <div style="height:100vh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;">
                        <div style="display:flex;justify-content:space-between;align-items:center;padding:2px 8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:26px;">
                            <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
                                <button class="btn btn-outline btn-sm" id="terminalExitBtn" style="font-size:0.55rem;padding:2px 8px;"><i class="fas fa-arrow-left"></i> Exit</button>
                                <span style="font-weight:700;font-family:Outfit,sans-serif;font-size:0.7rem;">📈 Trading Terminal</span>
                                <span class="account-no">${userAccountNo}</span>
                            </div>
                            <div style="display:flex;gap:3px;align-items:center;flex-wrap:wrap;">
                                <span id="simCash" style="color:var(--success);font-weight:600;font-size:0.6rem;">💰 $${(portfolio.cash || 0).toFixed(2)}</span>
                                <span id="simTotalValue" style="font-weight:600;font-size:0.6rem;">📊 $0</span>
                                <span id="simPL" style="font-weight:600;font-size:0.6rem;">📈 $0</span>
                            </div>
                        </div>
                        <div id="terminalContainer" style="flex:1;overflow:hidden;"></div>
                    </div>`;

                document.getElementById('terminalExitBtn').onclick = () => {
                    if (confirm('⚠️ Exit Trading Terminal? Positions/SL/TP will continue managing in background.')) {
                        isExitingTerminal = true;
                        cleanupSimIntervals();
                        disconnectBinanceWS();
                        stopBackgroundEngine();
                        savePortfolioToStorage();
                        savePendingOrders();
                        window.history.replaceState({}, '', '?');
                        renderApp();
                        showToast('👋 Exited Trading Terminal');
                    }
                };

                window._beforeUnloadHandler = function(e) {
                    if (!isExitingTerminal && document.querySelector('.terminal-wrapper, .mobile-terminal')) {
                        e.preventDefault();
                        e.returnValue =
                            '⚠️ You are leaving the Trading Terminal. Your positions will continue to manage in the background. Continue?';
                        return e.returnValue;

                window.addEventListener('beforeunload', window._beforeUnloadHandler);

                    renderMobileTerminal(container);

                    if (topBar) topBar.style.display = 'flex';
                    container.style.overflowY = 'hidden';
                    container.style.padding = '2px';
                    renderDesktopTerminal(container);
                }
                startBackgroundEngine();
                connectBinanceWS();
                setTimeout(renderQuotesBar, 100);
            }

                            <button class="tts-btn" id="pauseTTS"><i class="fas fa-pause"></i></button>
                            <button class="tts-btn" id="stopTTS"><i class="fas fa-stop"></i></button>
                            <span class="speed-label">Speed:</span><input type="range" class="speed-slider" id="speedSlider" min="0.5" max="2" step="0.1" value="1"><span class="speed-label" id="speedDisplay">1.0x</span>
                            <button class="btn-outline ${bm ? 'bookmarked' : ''}" id="bookmarkBtn"><i class="fas fa-bookmark"></i> ${bm ? 'Saved' : 'Bookmark'}</button>

                        <div style="display:flex;justify-content:space-between;margin-top:12px;gap:8px;">
                            <button class="tts-btn" id="prevLesson"><i class="fas fa-chevron-left"></i> Previous</button>

                function showTab(tn) {
                    tabs.forEach(t => t.classList.remove('active'));

                                '/bookmarks/' + id, { method: 'DELETE' });
                            bookmarks.delete(id); } else { await apiFetch('/bookmarks/' + id, { method: 'POST' });
                            bookmarks.add(id); } showLessonDetail(id); } catch (e) { showToast('⚠️ ' + e.message); } };
                document.getElementById('noteBtn').onclick = () => openNoteModal(id);
                document.getElementById('translateBtn').onclick = () => openTranslateOptions();
                document.getElementById('markCompleteBtn').onclick = async () => { try { await apiFetch('/progress', {
                            method: 'PUT',
                            body: JSON.stringify({ lessonId: id, progress: 100 })

                        showLessonDetail(id); } catch (e) { showToast('⚠️ ' + e.message); } };

                    document.getElementById('speedDisplay').textContent = speed.toFixed(1) + 'x';
                    window._ttsSpeed = speed; };

                setupPrevNext(subj, id);

                    .onclick = () => generateCertificate(subj);

            function renderQuizTab(container, lesson, lessonId) {
                if (!lesson.quiz || lesson.quiz.length === 0) { container.innerHTML =
                        '<div style="padding:14px;text-align:center;background:#fffbf0;border-radius:14px;font-size:0.8rem;">🧠 No quiz available.</div>';
                    return; }
                const qs = quizScores[lessonId];
                if (qs) {
                    const total = lesson.quiz.reduce((s, q) => s + (q.points || 5), 0);
                    container.innerHTML = `
                        <div class="quiz-container">
                            <h3 style="text-align:center;font-size:0.9rem;">${qs.passed ? '🎉' : '📚'} Quiz Result</h3>
                            <div style="text-align:center;font-size:2rem;font-weight:800;color:${qs.passed ? 'var(--success)' : 'var(--danger)'};">${qs.score}/${total}</div>
                            <p style="text-align:center;font-size:0.8rem;">${qs.passed ? 'PASSED' : 'FAILED'}</p>
                            <div style="text-align:center;margin-top:8px;"><button class="btn btn-primary" id="retryQuizBtn">🔄 Retry Quiz</button></div>
                        </div>`;
                    document.getElementById('retryQuizBtn').onclick = async () => { try { await apiFetch('/quiz/reset/' +
                            lessonId, { method: 'POST' });
                            delete quizScores[lessonId];
                            showLessonDetail(lessonId);
                            setTimeout(() => { const qt = document.querySelector('.tab[data-tab="quiz"]'); if (qt) qt
                                    .click(); }, 100); } catch (e) { showToast('⚠️ ' + e.message); } };
                    return;
                }
                let answers = new Array(lesson.quiz.length).fill(null);
                let qIdx = 0;

                function renderQuestion() {
                    const q = lesson.quiz[qIdx];
                    container.innerHTML = `
                        <div class="quiz-container">
                            <p style="font-size:0.65rem;color:var(--text-muted);">Question ${qIdx+1} of ${lesson.quiz.length} | Points: <strong>${q.points || 5}</strong></p>
                            <p class="quiz-question">${t(q.question)}</p>
                            <div id="quizOptions"></div>
                            <div style="display:flex;justify-content:space-between;margin-top:10px;gap:4px;">
                                <button class="btn btn-outline btn-sm" id="prevQBtn" ${qIdx === 0 ? 'disabled' : ''}>← Prev</button>
                                <button class="btn btn-primary btn-sm" id="nextQBtn" ${qIdx >= lesson.quiz.length-1 ? 'style="display:none;"' : ''}>Next →</button>
                                <button class="btn btn-success btn-sm" id="submitQuizBtn" ${qIdx < lesson.quiz.length-1 ? 'style="display:none;"' : ''}>✅ Submit Quiz</button>
                            </div>
                        </div>`;
                    const optsDiv = document.getElementById('quizOptions');
                    q.options.forEach(opt => {
                        const btn = document.createElement('button');
                        btn.className = 'quiz-option' + (answers[qIdx] === opt.id ? ' selected' : '');
                        btn.textContent = t(opt.text);
                        btn.style.fontSize = '0.75rem';
                        btn.onclick = () => { answers[qIdx] = opt.id;
                            optsDiv.querySelectorAll('.quiz-option').forEach(b => b.classList.remove(
                                'selected'));
                            btn.classList.add('selected'); };
                        optsDiv.appendChild(btn);
                    });
                    document.getElementById('prevQBtn').onclick = () => { if (qIdx > 0) { qIdx--;
                            renderQuestion(); } };
                    document.getElementById('nextQBtn').onclick = () => { if (qIdx < lesson.quiz.length - 1) { qIdx++;
                            renderQuestion(); } };
                    document.getElementById('submitQuizBtn').onclick = () => submitQuiz(container, lesson, lessonId,
                        answers);
                }
                renderQuestion();
            }

            async function submitQuiz(container, lesson, lessonId, answers) {
                const unanswered = answers.findIndex(a => a === null);
                if (unanswered !== -1) { showToast('⚠️ Please answer question ' + (unanswered + 1)); return; }
                let earned = 0;
                lesson.quiz.forEach((q, i) => { if (answers[i] === q.correct) earned += (q.points || 5); });
                const passed = earned >= (lesson.quizPassScore || 80);
                try {
                    await apiFetch('/quiz/submit', { method: 'POST', body: JSON.stringify({ lessonId, score: earned,
                            passed }) });
                    quizScores[lessonId] = { score: earned, passed };
                    showToast('📝 Score: ' + earned + ' — ' + (passed ? 'Passed! 🎉' : 'Failed. Try again! 💪'));
                    showLessonDetail(lessonId);
                    setTimeout(() => { const qt = document.querySelector('.tab[data-tab="quiz"]'); if (qt) qt.click(); },
                        100);
                } catch (e) { showToast('⚠️ ' + e.message); }
            }

            // ─── TTS ──────────────────────────────────────────────────────────
            function setupTTS(lessonId) {
                const subj = subjects.find(s => s.id === selectedSubjectId);
                const les = subj?.lessons?.find(l => l.id === lessonId);
                if (!les) return;
                const txt = les.contents ? stripHtml(t(les.contents)) : '';
                let utterance = null;
                let isPaused = false;

                function speak() {
                    if (!txt) { showToast('⚠️ No text to speak'); return; }
                    if (window.speechSynthesis) {
                        if (utterance && !isPaused) window.speechSynthesis.cancel();
                        if (isPaused && utterance) {
                            window.speechSynthesis.resume();
                            isPaused = false;
                            showToast('▶️ Resumed');
                            return;
                        }
                        utterance = new SpeechSynthesisUtterance(txt);
                        utterance.rate = parseFloat(document.getElementById('speedSlider')?.value || 1);
                        utterance.lang = currentLang === 'bn' ? 'bn-BD' : currentLang === 'hi' ? 'hi-IN' : 'en-US';
                        utterance.onstart = () => { showToast('🔊 Playing...');
                            isPaused = false; };
                        utterance.onerror = () => { showToast('⚠️ TTS error');
                            isPaused = false; };
                        utterance.onend = () => { showToast('✅ TTS finished');
                            isPaused = false; };
                        utterance.onpause = () => { isPaused = true;
                            showToast('⏸️ Paused'); };
                        utterance.onresume = () => { isPaused = false;
                            showToast('▶️ Resumed'); };
                        window.speechSynthesis.speak(utterance);
                    } else showToast('⚠️ TTS not supported');
                }

                document.getElementById('playTTS').onclick = speak;
                document.getElementById('pauseTTS').onclick = () => {
                    if (window.speechSynthesis && window.speechSynthesis.speaking) {
                        if (isPaused) { window.speechSynthesis.resume();
                            isPaused = false;
                            showToast('▶️ Resumed'); } else { window.speechSynthesis.pause();
                            isPaused = true;
                            showToast('⏸️ Paused'); }
                    } else { showToast('⚠️ No audio playing'); }
                };
                document.getElementById('stopTTS').onclick = () => { if (window.speechSynthesis) { window
                            .speechSynthesis.cancel();
                        isPaused = false;
                        showToast('⏹️ Stopped'); } };
            }

            function setupPrevNext(subj, curId) {
                const lessons = subj?.lessons || [];
                const idx = lessons.findIndex(l => l.id === curId);
                document.getElementById('prevLesson').onclick = () => { if (idx > 0) showLessonDetail(lessons[idx - 1]
                        .id);
                    else showToast('📌 First lesson'); };
                document.getElementById('nextLesson').onclick = () => { if (idx < lessons.length - 1) showLessonDetail(
                        lessons[idx + 1].id);
                    else showToast('📌 Last lesson'); };
            }

                const existing = userNotes[lessonId] || '';

            async function generateCertificate(subj) {
                const div = document.createElement('div');
                div.style.cssText = 'position:fixed;left:-9999px;top:0;width:780px;';
                div.innerHTML = `
                    <div id="certCap" style="background:#fffdf7;border:8px double #c9a84c;padding:40px 30px;text-align:center;font-family:'Playfair Display',serif;border-radius:12px;">
                        <div style="font-size:2rem;">🏅</div>
                        <h2 style="font-size:1.2rem;">Certificate of Completion</h2>
                        <p style="font-size:0.9rem;">This certifies that</p>
                        <p style="font-size:1.3rem;color:#5b4af5;font-weight:700;">${currentUser?.username || 'Student'}</p>
                        <p style="font-size:0.9rem;">has completed</p>
                        <p style="font-size:1.1rem;font-weight:700;">${t(subj.names)}</p>
                        <p style="color:#777;margin-top:12px;font-size:0.8rem;">Date: ${new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}</p>
                    </div>`;
                document.body.appendChild(div);
                await new Promise(r => setTimeout(r, 300));
                try {
                    const canvas = await html2canvas(document.getElementById('certCap'), { scale: 2,
                        backgroundColor: '#fffdf7' });
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('landscape', 'pt', [canvas.width, canvas.height]);
                    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
                    const pdfBlob = pdf.output('blob');
                    const formData = new FormData();
                    formData.append('file', pdfBlob, 'Certificate_' + t(subj.names).replace(/\s+/g, '_') + '.pdf');
                    const uploadRes = await fetch(API_BASE + '/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' +
                                token }, body: formData });
                    if (!uploadRes.ok) throw new Error('Upload failed');
                    const uploadData = await uploadRes.json();
                    const a = document.createElement('a');
                    a.href = uploadData.url;
                    a.download = 'Certificate_' + t(subj.names).replace(/\s+/g, '_') + '.pdf';
                    a.click();
                    showToast('🎓 Certificate uploaded & downloaded!');
                    showToast('🔗 Share: ' + uploadData.url);
                } catch (e) { showToast('⚠️ Certificate error: ' + e.message); }
                document.body.removeChild(div);
            }

                [subjects[idx], subjects[n]] = [subjects[n], subjects[idx]]; try { await apiFetch('/subjects/reorder', {
                        method: 'POST',
                        body: JSON.stringify({ ids: subjects.map(s => s.id) })
                    });
                    renderAdminSubjectList();
                    showAdminLessonManager(); } catch (e) { showToast('⚠️ ' + e.message); } };
            window.deleteSubject = async function(id) { if (!confirm('⚠️ Delete this subject and ALL its lessons?')) return;
                try { await apiFetch('/subjects/' + id, { method: 'DELETE' });
                    subjects = subjects.filter(s => s.id !== id); if (selectedSubjectId === id) selectedSubjectId = subjects[
                        0]?.id || null;
                    renderAdminSubjectList();
                    showAdminLessonManager();
                    showToast('🗑 Subject deleted'); } catch (e) { showToast('⚠️ ' + e.message); } };

                const modal = document.createElement('div');
