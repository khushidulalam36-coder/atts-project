                // Ensure we use the current price as starting price
                simLastPrices[simCurrentSymbol] = basePrice;
                simBasePrices[simCurrentSymbol] = basePrice;

                simAllCandles = generateSimulatedCandles(simCurrentSymbol, 200, basePrice, currentTimeframe);
                const lastCandle = simAllCandles[simAllCandles.length - 1];
                const now = Math.floor(Date.now() / 1000);
                const currentMinute = now - (now % 60);
                simCurrentCandle = {
                    time: currentMinute,
                    open: lastCandle.close,
                    high: lastCandle.close,
                    low: lastCandle.close,
                    close: lastCandle.close,
                    volume: 0
                };
                simLastPrices[simCurrentSymbol] = lastCandle.close;

                const isMobile = window.innerWidth <= 768;
                const chartHeight = isMobile ? chartDiv.clientHeight : 420;
                const isDark = appTheme === 'dark';

                simChart = LightweightCharts.createChart(chartDiv, {
                    width: chartDiv.clientWidth,
                    height: chartHeight,
                    timeScale: {
                        timeVisible: true,
                        secondsVisible: currentTimeframe < 300,
                        rightOffset: 8,
                        barSpacing: isMobile ? 4 : 8
                    },
                    layout: {
                        background: { type: 'solid', color: 'transparent' },
                        textColor: isDark ? '#94a3b8' : '#6b7280'
                    },
                    grid: { vertLines: { visible: false }, horzLines: { visible: false } },
                    crosshair: { mode: 1 },
                    rightPriceScale: { borderVisible: true, autoScale: true, scaleMargins: { top: 0.05,
                            bottom: 0.05 } },
                    handleScroll: { vertTouchDrag: false, horzTouchDrag: true },
                    handleScale: { axisPressedMouseMove: true, pinch: true },
                });

                simCandleSeries = simChart.addCandlestickSeries({
                    upColor: '#10b981',
                    downColor: '#ef4444',
                    borderUpColor: '#10b981',
                    borderDownColor: '#ef4444',
                    wickUpColor: '#10b981',
                    wickDownColor: '#ef4444'
                });
                simVolumeSeries = simChart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: '' });
                if (showVolume) simChart.priceScale('').applyOptions({ scaleMargins: { top: 0.88, bottom: 0 } });
                else simChart.priceScale('').applyOptions({ scaleMargins: { top: 0, bottom: 0 } });

                const allCandles = [...simAllCandles];
                if (simCurrentCandle) allCandles.push(simCurrentCandle);
                simCandleSeries.setData(allCandles);
                updateAllIndicators();
                const volData = simAllCandles.map(c => ({ time: c.time, value: c.volume, color: c.close >= c.open ?
                        'rgba(16,185,129,0.35)' : 'rgba(239,68,68,0.35)' }));
                simVolumeSeries.setData(volData);

                simChart.timeScale().fitContent();

                // ─── Draw Events ──────────────────────────────────────────────
                simChart.subscribeClick(param => {
                    if (dragState && dragState.active) return;
                    if (!currentDrawingTool || !param.point || !simCandleSeries) return;
                    if (param.point.y > 0 && param.point.y < chartDiv.clientHeight) {
                        const price = simCandleSeries.coordinateToPrice(param.point.y);
                        if (price !== null && price > 0) {
                            let color, label;
                            if (currentDrawingTool === 'support') { color = '#10b981';
                                label = 'Support'; } else if (currentDrawingTool === 'resistance') { color =
                                    '#ef4444';
                                label = 'Resistance'; } else { color = '#3b82f6';
                                label = 'H-Line'; }
                            if (!portfolio.drawnLines[simCurrentSymbol]) portfolio.drawnLines[simCurrentSymbol] =
                                [];
                            portfolio.drawnLines[simCurrentSymbol].push({ price: +price.toFixed(4), color,
                                label, style: 0 });
                            savePortfolioToStorage();
                            redrawAllLines();
                            showToast('📐 ' + label + ' at $' + price.toFixed(4));
                            currentDrawingTool = null;
                            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                        }
                    }
                });

                simChart.subscribeCrosshairMove(param => {
                    if (!param.point || !simCandleSeries || manualDrawnLines.length === 0) { chartDiv
                            .classList.remove('dragging-line'); return; }
                    let nearLine = false;
                    const threshold = 12;
                    for (const ml of manualDrawnLines) {
                        if (!ml.lineObj) continue;
                        const lineY = simCandleSeries.priceToCoordinate(ml.price);
                        if (lineY !== null && Math.abs(param.point.y - lineY) < threshold) { nearLine =
                            true; break; }
                    }
                    chartDiv.classList.toggle('dragging-line', nearLine);
                    if (dragState && dragState.active && simCandleSeries) {
                        const newPrice = simCandleSeries.coordinateToPrice(param.point.y);
                        if (newPrice !== null && newPrice > 0) {
                            dragState.currentPrice = +newPrice.toFixed(4);
                            const ml = manualDrawnLines.find(m => m.key === dragState.lineKey);
                            if (ml && ml.lineObj) {
                                try { simCandleSeries.removePriceLine(ml.lineObj); } catch (e) {}
                                const newLine = simCandleSeries.createPriceLine({ price: dragState
                                        .currentPrice, color: ml.color, lineWidth: 2, lineStyle: ml
                                        .style || 0, axisLabelVisible: true, title: ml.label });
                                ml.lineObj = newLine;
                                allPriceLines[ml.key] = newLine;
                            }
                        }
                    }
                });

                const mousedownHandler = (e) => {
                    if (!simCandleSeries || manualDrawnLines.length === 0) return;
                    const rect = chartDiv.getBoundingClientRect();
                    const y = (e.clientY || e.touches?.[0]?.clientY || 0) - rect.top;
                    const threshold = 14;
                    let closest = null,
                        closestDist = Infinity;
                    for (const ml of manualDrawnLines) {
                        if (!ml.lineObj) continue;
                        const lineY = simCandleSeries.priceToCoordinate(ml.price);
                        if (lineY !== null) {
                            const dist = Math.abs(y - lineY);
                            if (dist < threshold && dist < closestDist) { closest = ml;
                                closestDist = dist; }
                        }
                    }
                    if (closest) { dragState = { active: true, lineKey: closest.key, startPrice: closest
                                .price, currentPrice: closest.price, origIndex: closest.index };
                        chartDiv.classList.add('dragging-line');
                        e.preventDefault(); }
                };
                chartDiv.addEventListener('mousedown', mousedownHandler);
                chartDiv.addEventListener('touchstart', mousedownHandler, { passive: false });

                const moveHandler = (e) => {
                    if (!dragState || !dragState.active || !simCandleSeries) return;
                    const rect = chartDiv.getBoundingClientRect();
                    const y = (e.clientY || e.touches?.[0]?.clientY || 0) - rect.top;
                    const newPrice = simCandleSeries.coordinateToPrice(y);
                    if (newPrice !== null && newPrice > 0) {
                        dragState.currentPrice = +newPrice.toFixed(4);
                        const ml = manualDrawnLines.find(m => m.key === dragState.lineKey);
                        if (ml && ml.lineObj) {
                            try { simCandleSeries.removePriceLine(ml.lineObj); } catch (e) {}
                            const newLine = simCandleSeries.createPriceLine({ price: dragState
                                    .currentPrice, color: ml.color, lineWidth: 2, lineStyle: ml
                                    .style || 0, axisLabelVisible: true, title: ml.label });
                            ml.lineObj = newLine;
                            allPriceLines[ml.key] = newLine;
                        }
                    }
                };
                document.addEventListener('mousemove', moveHandler);
                document.addEventListener('touchmove', moveHandler, { passive: false });

                const upHandler = () => {
                    if (dragState && dragState.active) {
                        if (dragState.currentPrice !== dragState.startPrice) {
                            const idx = dragState.origIndex;
                            if (idx >= 0 && idx < (portfolio.drawnLines[simCurrentSymbol] || []).length) {
                                portfolio.drawnLines[simCurrentSymbol][idx].price = dragState.currentPrice;
                                savePortfolioToStorage();
                                redrawAllLines();
                                showToast('📐 Line moved to $' + dragState.currentPrice.toFixed(4));
                            }
                        }
                        dragState = null;
                        chartDiv.classList.remove('dragging-line');
                    }
                };
                document.addEventListener('mouseup', upHandler);
                document.addEventListener('touchend', upHandler);

                if (loadingEl) loadingEl.style.display = 'none';
                redrawAllLines();

                // ─── Price Update ─────────────────────────────────────────────
                if (simPriceIntervalId) clearInterval(simPriceIntervalId);
                simPriceIntervalId = setInterval(() => {
                    if (!simCurrentCandle || !simCandleSeries) return;
                    let price = simLastPrices[simCurrentSymbol];
                    if (!price) {
                        const vol = simVolatility[simCurrentSymbol] || 0.0015;
                        const change = simCurrentCandle.close * vol * (Math.random() - 0.48) * 0.8;
                        price = simCurrentCandle.close + change;
                        price = +price.toFixed(4);
                        simLastPrices[simCurrentSymbol] = price;
                    }
                    simCurrentCandle.high = Math.max(simCurrentCandle.high, price);
                    simCurrentCandle.low = Math.min(simCurrentCandle.low, price);
                    simCurrentCandle.close = price;
                    simCurrentCandle.volume += Math.floor(500 + Math.random() * 3000);
                    simCandleSeries.update(simCurrentCandle);
                    updateAllIndicators();
                    checkAndExecuteSLTP();
                    updateSimUI();
                    updateMobileTopBar();
                }, 1000);

                // ─── Candle Close ─────────────────────────────────────────────
                if (simCandleCloseIntervalId) clearInterval(simCandleCloseIntervalId);
                simCandleCloseIntervalId = setInterval(() => {
                    if (!simCurrentCandle || !simCandleSeries) return;
                    const now = Math.floor(Date.now() / 1000);
                    const currentMinute = now - (now % 60);
                    if (simCurrentCandle.time < currentMinute) {
                        simAllCandles.push({ ...simCurrentCandle });
                        const newOpen = simCurrentCandle.close;
                        simCurrentCandle = {
                            time: currentMinute,
                            open: newOpen,
                            high: newOpen,
                            low: newOpen,
                            close: newOpen,
                            volume: 0
                        };
                        simCandleSeries.update(simCurrentCandle);
                        updateAllIndicators();
                        if (simAllCandles.length > 300) simAllCandles.shift();
                    }
                }, 10000);

                // ─── Resize ──────────────────────────────────────────────────
                const debouncedResize = debounce(() => {
                    if (simChart && chartDiv.clientWidth > 0 && chartDiv.clientHeight > 0) {
                        simChart.applyOptions({ width: chartDiv.clientWidth, height: chartDiv
                                .clientHeight });
                        simChart.timeScale().fitContent();
                    }
                }, 100);
                simResizeObserver = new ResizeObserver(debouncedResize);
                simResizeObserver.observe(chartDiv);

                window._chartCleanup = function() {
                    document.removeEventListener('mousemove', moveHandler);
                    document.removeEventListener('touchmove', moveHandler);
                    document.removeEventListener('mouseup', upHandler);
                    document.removeEventListener('touchend', upHandler);
                    chartDiv.removeEventListener('mousedown', mousedownHandler);
                    chartDiv.removeEventListener('touchstart', mousedownHandler);
                    if (simPriceIntervalId) clearInterval(simPriceIntervalId);
                    if (simCandleCloseIntervalId) clearInterval(simCandleCloseIntervalId);
                    if (simResizeObserver) simResizeObserver.disconnect();
                };
            }

            // ─── UPDATE INDICATORS ────────────────────────────────────────────
            function updateAllIndicators() {
                if (!simCandleSeries || !simChart) return;
                const allData = [...simAllCandles];
                if (simCurrentCandle) allData.push(simCurrentCandle);
                const removeSeries = (key) => {
                    if (simIndicatorSeries[key]) {
                        try { simChart.removeSeries(simIndicatorSeries[key]); } catch (e) {}
                        delete simIndicatorSeries[key];
                    }
                };
                for (const [key, color] of Object.entries(indicatorColors)) {
                    if (!key.startsWith('ema')) continue;
                    const period = parseInt(key.replace('ema', ''));
                    if (activeIndicators[key]) {
                        const emaData = calculateEMA(allData, period);
                        if (simIndicatorSeries[key]) simIndicatorSeries[key].setData(emaData);
                        else {
                            const ls = simChart.addLineSeries({ color, lineWidth: 2, priceScaleId: 'right',
                                lastValueVisible: true, priceFormat: { type: 'price', precision: 4,
                                    minMove: 0.0001 } });
                            ls.setData(emaData);
                            simIndicatorSeries[key] = ls;
                        }
                    } else { removeSeries(key); }
                }
                if (activeIndicators['bb']) {
                    const { sma, upper, lower } = calculateBB(allData);
                    ['bb_sma', 'bb_upper', 'bb_lower'].forEach((k, i) => {
                        const data = [sma, upper, lower][i];
                        if (simIndicatorSeries[k]) simIndicatorSeries[k].setData(data);
                        else {
                            const ls = simChart.addLineSeries({ color: i === 0 ? '#a78bfa' : '#f59e0b',
                                lineWidth: 1, priceScaleId: 'right', lastValueVisible: false,
                                priceFormat: { type: 'price', precision: 4, minMove: 0.0001 } });
                            if (i > 0) ls.applyOptions({ lineStyle: 2 });
                            ls.setData(data);
                            simIndicatorSeries[k] = ls;
                        }
                    });
                } else { ['bb_sma', 'bb_upper', 'bb_lower'].forEach(k => removeSeries(k)); }
                if (activeIndicators['rsi']) {
                    const rsiData = calculateRSI(allData);
                    if (simIndicatorSeries['rsi']) simIndicatorSeries['rsi'].setData(rsiData);
                    else {
                        const pane = simChart.addLineSeries({ color: indicatorColors['rsi'], lineWidth: 2,
                            priceScaleId: 'rsi', lastValueVisible: true, priceFormat: { type: 'price',
                                precision: 2, minMove: 0.01 } });
                        simChart.priceScale('rsi').applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } });
                        pane.setData(rsiData);
                        simIndicatorSeries['rsi'] = pane;
                    }
                } else { removeSeries('rsi'); }
                if (activeIndicators['macd']) {
                    const { macd, signal, histogram } = calculateMACD(allData);
                    if (macd.length > 0) {
                        if (simIndicatorSeries['macd']) simIndicatorSeries['macd'].setData(macd);
                        else {
                            const pane = simChart.addLineSeries({ color: indicatorColors['macd'], lineWidth: 2,
                                priceScaleId: 'macd', lastValueVisible: false,
                                priceFormat: { type: 'price', precision: 4, minMove: 0.0001 } });
                            simChart.priceScale('macd').applyOptions({ scaleMargins: { top: 0.9,
                                    bottom: 0.2 } });
                            pane.setData(macd);
                            simIndicatorSeries['macd'] = pane;
                        }
                        if (simIndicatorSeries['macd_signal']) simIndicatorSeries['macd_signal'].setData(signal);
                        else {
                            const sigPane = simChart.addLineSeries({ color: '#34d399', lineWidth: 1,
                                priceScaleId: 'macd', lastValueVisible: false,
                                priceFormat: { type: 'price', precision: 4, minMove: 0.0001 } });
                            sigPane.setData(signal);
                            simIndicatorSeries['macd_signal'] = sigPane;
                        }
                        const histData = histogram.map(h => ({ time: h.time, value: h.value, color: h
                                .value >= 0 ? 'rgba(16,185,129,0.5)' :

                        if (simIndicatorSeries['macd_hist']) simIndicatorSeries['macd_hist'].setData(histData);
                        else {
                            const histSeries = simChart.addHistogramSeries({ priceScaleId: 'macd',
                                priceFormat: { type: 'price', precision: 4 } });
                            histSeries.setData(histData);
                            simIndicatorSeries['macd_hist'] = histSeries;
                        }
                    }
                } else { ['macd', 'macd_signal', 'macd_hist'].forEach(k => removeSeries(k)); }
                if (activeIndicators['stoch']) {
                    const { k, d } = calculateStochastic(allData);
                    if (k.length > 0) {

                            const kPane = simChart.addLineSeries({ color: '#06b6d4', lineWidth: 2,

                            simIndicatorSeries['stoch_d'] = dPane;

                        simChart.priceScale('').applyOptions({ scaleMargins: { top: 0, bottom: 0 } }); }

            // ─── UI UPDATE ─────────────────────────────────────────────────────
            function updateSimUI() {
                if (!portfolio) return;
                let totalPL = 0,
                    totalValue = portfolio.cash;
                for (const sym in portfolio.holdings) {
                    const h = portfolio.holdings[sym];
                    const cp = simLastPrices[sym] || h.currentPrice || h.avgPrice;
                    h.currentPrice = cp;
                    if (h.qty > 0) totalPL += (cp - h.avgPrice) * h.qty;
                    else totalPL += (h.avgPrice - cp) * Math.abs(h.qty);
                    totalValue += Math.abs(h.qty) * cp;
                }
                const cashEl = document.getElementById('simCash') || document.getElementById('simCashBar');
                const totalEl = document.getElementById('simTotalValue') || document.getElementById('simTotalBar');
                const plEl = document.getElementById('simPL') || document.getElementById('simPLBar');
                if (cashEl) cashEl.textContent = '💰 $' + portfolio.cash.toFixed(2);
                if (totalEl) totalEl.textContent = '📊 $' + totalValue.toFixed(2);
                if (plEl) {
                    plEl.textContent = (totalPL >= 0 ? '📈 +$' : '📈 -$') + Math.abs(totalPL).toFixed(2);
                    plEl.style.color = totalPL >= 0 ? 'var(--success)' : 'var(--danger)';
                }
                const tbody = document.querySelector('#simHoldingsTable tbody');
                const fsTbody = document.querySelector('#simHoldingsTableFs tbody');
                const rowsHTML = Object.keys(portfolio.holdings).map(sym => {
                    const h = portfolio.holdings[sym];
                    const cp = h.currentPrice || h.avgPrice;
                    const val = Math.abs(h.qty) * cp;
                    const isShort = h.qty < 0;
                    return `<tr><td><strong>${sym}</strong> ${isShort ? '<span style="color:var(--danger);font-size:0.65rem;">SHORT</span>' : '<span style="color:var(--success);font-size:0.65rem;">LONG</span>'}</td><td>${Math.abs(h.qty)}</td><td><span class="entry-badge">$${h.avgPrice.toFixed(4)}</span></td><td>$${cp.toFixed(4)}</td><td>${h.slPrice ? '<span class="sl-badge">$' + h.slPrice.toFixed(4) + '</span>' : '—'}</td><td>${h.tpPrice ? '<span class="tp-badge">$' + h.tpPrice.toFixed(4) + '</span>' : '—'}</td><td>$${val.toFixed(2)}</td><td style="display:flex;gap:4px;"><button class="btn-exit" onclick="exitPosition('${sym}')"><i class="fas fa-times"></i> Exit</button><button class="btn btn-sm btn-outline" onclick="editSLTP('${sym}')"><i class="fas fa-sliders-h"></i></button></td></tr>`;
                }).join('') || '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);">No open positions</td></tr>';
                if (tbody) tbody.innerHTML = rowsHTML;
                if (fsTbody) fsTbody.innerHTML = rowsHTML;
                const histEl = document.getElementById('simHistoryList');
                if (histEl) histEl.innerHTML =
                    '<strong>Transaction History</strong><ul style="list-style:none;padding:0;">' + (portfolio
                        .transactions || []).slice(0, 25).map(t =>
                        `<li style="padding:4px 0;border-bottom:1px solid var(--border-light);">${t.time} - <span style="color:${t.type === 'buy' ? 'var(--success)' : t.type === 'sell' ? 'var(--danger)' : 'var(--mt5-blue)'};">${t.type.toUpperCase()}</span> ${t.qty} × ${t.symbol} @ $${(t.price || 1).toFixed(4)}${t.reason ? ' (' + t.reason + ')' : ''}</li>`
                    ).join('') + '</ul>';
                updateSimUIFullscreen();
                savePortfolioToStorage();
                if (window.innerWidth <= 768) { renderMobileTradeSummary();
                    updateMobileTopBar(); }
            }

            function updateSimUIFullscreen() {
                const fsCash = document.getElementById('fsCash'),
                    fsTotal = document.getElementById('fsTotal'),
                    fsPL = document.getElementById('fsPL');
                if (!fsCash || !fsTotal || !fsPL) return;
                let totalPL = 0,
                    totalValue = portfolio.cash;
                for (const sym in portfolio.holdings) {
                    const h = portfolio.holdings[sym];
                    const cp = simLastPrices[sym] || h.currentPrice || h.avgPrice;
                    if (h.qty > 0) totalPL += (cp - h.avgPrice) * h.qty;
                    else totalPL += (h.avgPrice - cp) * Math.abs(h.qty);
                    totalValue += Math.abs(h.qty) * cp;
                }
                fsCash.textContent = '💰 $' + portfolio.cash.toFixed(2);
                fsTotal.textContent = '📊 $' + totalValue.toFixed(2);
                fsPL.textContent = '📈 ' + (totalPL >= 0 ? '+' : '') + '$' + totalPL.toFixed(2);
                fsPL.style.color = totalPL >= 0 ? 'var(--success)' : 'var(--danger)';
            }

            // ─── TRADING ACTIONS ─────────────────────────────────────────────
            async function placeSimOrder(type) {
                const symbol = document.getElementById('simSymbolSelect')?.value || simCurrentSymbol;
                const qty = parseFloat(document.getElementById('simQty')?.value) || 1;
                const slVal = parseFloat(document.getElementById('simSL')?.value);
                const tpVal = parseFloat(document.getElementById('simTP')?.value);
                if (!qty || qty <= 0) return showToast('❌ Invalid quantity');
                let price = simLastPrices[symbol];
                if (!price || price <= 0) price = simBasePrices[symbol] || 150;
                if (type === 'buy') {
                    const cost = qty * price;
                    if (portfolio.cash < cost) return showToast('❌ Insufficient cash');
                    portfolio.cash -= cost;
                    if (portfolio.holdings[symbol]) {
                        const h = portfolio.holdings[symbol];
                        if (h.qty < 0) {
                            const closeQty = Math.min(Math.abs(h.qty), qty);
                            h.qty += closeQty;
                            if (h.qty === 0) delete portfolio.holdings[symbol];
                            portfolio.transactions.unshift({ type: 'buy', symbol, qty: closeQty, price,
                                time: new Date().toLocaleTimeString(), reason: 'Close Short' });
                            showToast('🔄 Closed ' + closeQty + ' short ' + symbol + ' @ $' + price.toFixed(4));
                        } else {
                            const totalCost = qty * price;
                            const newAvg = ((h.qty * h.avgPrice) + totalCost) / (h.qty + qty);
                            h.qty += qty;
                            h.avgPrice = newAvg;
                            h.entryPrice = newAvg;
                            if (!isNaN(slVal) && slVal > 0) h.slPrice = slVal;
                            if (!isNaN(tpVal) && tpVal > 0) h.tpPrice = tpVal;
                            portfolio.transactions.unshift({ type: 'buy', symbol, qty, price,
                                time: new Date().toLocaleTimeString() });
                            showToast('✅ Bought ' + qty + ' × ' + symbol + ' @ $' + price.toFixed(4));
                        }
                    } else {
                        portfolio.holdings[symbol] = { qty, avgPrice: price, currentPrice: price,
                        entryPrice: price };
                        if (!isNaN(slVal) && slVal > 0) portfolio.holdings[symbol].slPrice = slVal;
                        if (!isNaN(tpVal) && tpVal > 0) portfolio.holdings[symbol].tpPrice = tpVal;
                        portfolio.transactions.unshift({ type: 'buy', symbol, qty, price,
                            time: new Date().toLocaleTimeString() });
                        showToast('✅ Bought ' + qty + ' × ' + symbol + ' @ $' + price.toFixed(4));
                    }
                    playTradeSound('buy');
                } else {
                    if (portfolio.holdings[symbol] && portfolio.holdings[symbol].qty > 0) {
                        const h = portfolio.holdings[symbol];
                        const closeQty = Math.min(h.qty, qty);
                        portfolio.cash += closeQty * price;
                        h.qty -= closeQty;
                        if (h.qty === 0) delete portfolio.holdings[symbol];
                        portfolio.transactions.unshift({ type: 'sell', symbol, qty: closeQty, price,
                            time: new Date().toLocaleTimeString(), reason: 'Close Long' });
                        showToast('✅ Sold ' + closeQty + ' × ' + symbol + ' @ $' + price.toFixed(4));
                    } else {
                        if (portfolio.holdings[symbol] && portfolio.holdings[symbol].qty < 0) {
                            const h = portfolio.holdings[symbol];
                            const newAvg = ((Math.abs(h.qty) * h.avgPrice) + (qty * price)) / (Math.abs(h.qty) +
                                qty);
                            h.qty -= qty;
                            h.avgPrice = newAvg;
                            h.entryPrice = newAvg;
                            if (!isNaN(slVal) && slVal > 0) h.slPrice = slVal;
                            if (!isNaN(tpVal) && tpVal > 0) h.tpPrice = tpVal;
                            portfolio.transactions.unshift({ type: 'sell', symbol, qty, price,
                                time: new Date().toLocaleTimeString(), reason: 'Add Short' });
                            showToast('🔻 Added short ' + qty + ' × ' + symbol + ' @ $' + price.toFixed(4));
                        } else {
                            portfolio.holdings[symbol] = { qty: -qty, avgPrice: price, currentPrice: price,
                                entryPrice: price };
                            if (!isNaN(slVal) && slVal > 0) portfolio.holdings[symbol].slPrice = slVal;
                            if (!isNaN(tpVal) && tpVal > 0) portfolio.holdings[symbol].tpPrice = tpVal;
                            portfolio.transactions.unshift({ type: 'sell', symbol, qty, price,
                                time: new Date().toLocaleTimeString(), reason: 'Short' });
                            showToast('🔻 Shorted ' + qty + ' × ' + symbol + ' @ $' + price.toFixed(4));
                        }
                    }
                    playTradeSound('sell');
                }
                savePortfolioToStorage();
                updateSimUI();
                redrawAllLines();
                document.getElementById('simSL').value = '';
                document.getElementById('simTP').value = '';
                document.querySelectorAll('.modal').forEach(m => {
                    if (m.querySelector('h3')?.textContent?.includes('TRADE')) m.remove();
                });
            }

            async function exitPosition(symbol) {
                if (!portfolio.holdings[symbol]) return;
                const h = portfolio.holdings[symbol];
                const price = simLastPrices[symbol] || h.currentPrice || h.avgPrice;
                const closeQty = Math.abs(h.qty);
                if (h.qty > 0) portfolio.cash += closeQty * price;
                portfolio.transactions.unshift({ type: 'sell', symbol, qty: closeQty, price,
                    time: new Date().toLocaleTimeString(), reason: 'Manual Exit' });
                delete portfolio.holdings[symbol];
                savePortfolioToStorage();
                updateSimUI();
                redrawAllLines();
                playTradeSound('sell');
                showToast('🚪 Exited ' + symbol + ' @ $' + price.toFixed(4));
                document.querySelectorAll('.modal').forEach(m => m.remove());
            }

            function editSLTP(symbol) {
                const h = portfolio.holdings[symbol];
                if (!h) return;
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML =
                    `<div class="modal-content"><h3>Edit SL/TP — ${symbol}</h3><label>Stop Loss ($) <input type="number" id="editSL" value="${h.slPrice || ''}" step="0.0001"></label><label>Take Profit ($) <input type="number" id="editTP" value="${h.tpPrice || ''}" step="0.0001"></label><div class="modal-actions"><button class="btn btn-outline" onclick="this.closest('.modal').remove()">Cancel</button><button class="btn btn-primary" id="saveSLTP">💾 Save</button></div></div>`;
                document.body.appendChild(modal);
                modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
                document.getElementById('saveSLTP').onclick = () => {
                    const sl = parseFloat(document.getElementById('editSL').value);
                    const tp = parseFloat(document.getElementById('editTP').value);
                    h.slPrice = !isNaN(sl) && sl > 0 ? sl : null;
                    h.tpPrice = !isNaN(tp) && tp > 0 ? tp : null;
                    savePortfolioToStorage();
                    updateSimUI();
                    redrawAllLines();
                    modal.remove();
                    showToast('✅ SL/TP updated');
                };
            }

            function checkAndExecuteSLTP() {
                if (!portfolio || !portfolio.holdings) return;
                let changed = false;
                for (const sym in portfolio.holdings) {
                    const h = portfolio.holdings[sym];
                    const price = simLastPrices[sym] || h.currentPrice || h.avgPrice;
                    const isShort = h.qty < 0;
                    if (h.slPrice) {
                        if ((!isShort && price <= h.slPrice) || (isShort && price >= h.slPrice)) {
                            const closeQty = Math.abs(h.qty);
                            if (h.qty > 0) portfolio.cash += closeQty * price;
                            portfolio.transactions.unshift({ type: 'sell', symbol: sym, qty: closeQty, price,
                                time: new Date().toLocaleTimeString(), reason: 'Stop Loss' });
                            delete portfolio.holdings[sym];
                            showToast('🛑 SL triggered ' + sym + ' @ $' + price.toFixed(4));
                            playTradeSound('sell');
                            changed = true;
                            continue;
                        }
                    }
                    if (h.tpPrice) {
                        if ((!isShort && price >= h.tpPrice) || (isShort && price <= h.tpPrice)) {
                            const closeQty = Math.abs(h.qty);
                            if (h.qty > 0) portfolio.cash += closeQty * price;
                            portfolio.transactions.unshift({ type: 'sell', symbol: sym, qty: closeQty, price,
                                time: new Date().toLocaleTimeString(), reason: 'Take Profit' });
                            delete portfolio.holdings[sym];
                            showToast('🎯 TP triggered ' + sym + ' @ $' + price.toFixed(4));
                            playTradeSound('sell');
                            changed = true;
                        }
                    }
                }
                if (changed) { savePortfolioToStorage();
                    updateSimUI();
                    redrawAllLines(); }
            }

            function resetSimPortfolio() {
                if (confirm('Reset portfolio? All trades cleared.')) {
                    portfolio = { cash: 100000, holdings: {}, transactions: [], drawnLines: {} };
                    simLastPrices = {};
                    activeIndicators = {};
                    simIndicatorSeries = {};
                    savePortfolioToStorage();
                    updateSimUI();
                    redrawAllLines();
                    showToast('🔄 Portfolio reset ($100,000)');
                }
            }

            // ─── DRAWING LINES ─────────────────────────────────────────────────
            function redrawAllLines() {
                if (!simCandleSeries) return;
                Object.values(allPriceLines).forEach(line => { try { simCandleSeries.removePriceLine(line); } catch (
                    e) {} });
                allPriceLines = {};
                manualDrawnLines = [];
                const symbolLines = (portfolio.drawnLines && portfolio.drawnLines[simCurrentSymbol]) || [];
                symbolLines.forEach((l, idx) => {
                    const line = simCandleSeries.createPriceLine({ price: l.price, color: l.color || '#3b82f6',
                        lineWidth: 2, lineStyle: l.style || 0, axisLabelVisible: true, title: l.label || '' });
                    const key = 'manual_' + idx;
                    allPriceLines[key] = line;
                    manualDrawnLines.push({ key, price: l.price, color: l.color, label: l.label, style: l
                            .style, lineObj: line, index: idx });
                });
                for (const sym in portfolio.holdings) {
                    const h = portfolio.holdings[sym];
                    if (h.entryPrice && h.entryPrice > 0) {
                        const line = simCandleSeries.createPriceLine({ price: h.entryPrice, color: '#3b82f6',
                            lineWidth: 1, lineStyle: 0, axisLabelVisible: true, title: 'Entry ' + sym });
                        allPriceLines['entry_' + sym] = line;
                    }
                    if (h.slPrice && h.slPrice > 0) {
                        const line = simCandleSeries.createPriceLine({ price: h.slPrice, color: '#f59e0b',
                            lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'SL ' + sym });
                        allPriceLines['sl_' + sym] = line;
                    }
                    if (h.tpPrice && h.tpPrice > 0) {
                        const line = simCandleSeries.createPriceLine({ price: h.tpPrice, color: '#8b5cf6',
                            lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'TP ' + sym });
                        allPriceLines['tp_' + sym] = line;
                    }
                }
                updateLineManagerUI();
            }

            function deleteSingleLine(idx) {
                if (!portfolio.drawnLines[simCurrentSymbol]) return;
                portfolio.drawnLines[simCurrentSymbol].splice(idx, 1);
                savePortfolioToStorage();
                redrawAllLines();
                showToast('🗑 Line deleted');
            }

            function updateLineManagerUI() {
                const el = document.getElementById('lineManagerList');
                if (!el) return;
                const lines = portfolio.drawnLines[simCurrentSymbol] || [];
                if (lines.length === 0) { el.innerHTML =
                        '<span style="color:var(--text-muted);font-size:0.68rem;">No drawn lines</span>'; return; }
                el.innerHTML = lines.map((l, i) =>
                    `<div class="line-manager-row"><span class="line-dot" style="background:${l.color || '#3b82f6'};"></span><span style="flex:1;">${l.label || 'Line'} — $${l.price.toFixed(4)}</span><button class="line-delete-btn" onclick="deleteSingleLine(${i})" title="Delete">×</button></div>`
                    ).join('');
            }

            function setDrawingTool(tool, btnId) {
                currentDrawingTool = tool;
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                if (btnId) document.getElementById(btnId)?.classList.add('active');
                showToast('📐 Click price scale to draw ' + (tool === 'support' ? 'Support' : tool === 'resistance' ?
                    'Resistance' : 'Horizontal line'));
            }

            function toggleFsBottomPanel() {
                fsShowBottom = !fsShowBottom;
                const bp = document.getElementById('fsBottomPanel');
                if (bp) bp.classList.toggle('show', fsShowBottom);
                if (fsShowBottom) updateSimUIFullscreen();
                setTimeout(() => {
                    if (simChart) {
                        const chartDiv = document.getElementById('simChartContainer');
                        if (chartDiv) {
                            simChart.applyOptions({ width: chartDiv.clientWidth, height: chartDiv
                                    .clientHeight });
                            simChart.timeScale().fitContent();
                        }
                    }
                }, 200);
            }

            function exitFullscreenTerminal() {
                const wrapper = document.getElementById('terminalWrapper');
                if (wrapper) {
                    wrapper.classList.remove('fullscreen-active');
                    fsShowBottom = false;
                    const bp = document.getElementById('fsBottomPanel');
                    if (bp) bp.classList.remove('show');
                    setTimeout(() => {
                        if (simChart) {
                            const chartDiv = document.getElementById('simChartContainer');
                            if (chartDiv) {
                                simChart.applyOptions({ width: chartDiv.clientWidth, height: 420 });
                                simChart.timeScale().fitContent();
                            }
                        }
                    }, 300);
                }
            }

            // ─── GLOBAL EXPOSURE ──────────────────────────────────────────────
            window.updateSimUI = updateSimUI;
            window.placeSimOrder = placeSimOrder;
            window.exitPosition = exitPosition;
            window.editSLTP = editSLTP;
            window.checkAndExecuteSLTP = checkAndExecuteSLTP;
            window.toggleFsBottomPanel = toggleFsBottomPanel;
            window.exitFullscreenTerminal = exitFullscreenTerminal;
            window.redrawAllLines = redrawAllLines;
            window.deleteSingleLine = deleteSingleLine;
            window.updateLineManagerUI = updateLineManagerUI;
            window.setDrawingTool = setDrawingTool;
            window.resetSimPortfolio = resetSimPortfolio;
            window.initChart = initChart;
            window.depositFunds = depositFunds;
            window.withdrawFunds = withdrawFunds;
            window.selectMobileSymbol = selectMobileSymbol;
            window.placeSimOrderMobile = placeSimOrderMobile;
            window.updateMobileTopBar = updateMobileTopBar;
            window.renderMobileTradeSummary = renderMobileTradeSummary;
            window.setMobileLot = setMobileLot;
            window.changeMobileLot = changeMobileLot;
            window.updateAllIndicators = updateAllIndicators;
            window.activeIndicators = activeIndicators;
            window.simCurrentSymbol = simCurrentSymbol;
            window.simLastPrices = simLastPrices;
            window.portfolio = portfolio;
            window.openDesktopTradePanel = openDesktopTradePanel;
            window.calcEquity = calcEquity;
            window.calcTotalPL = calcTotalPL;
            window.showToast = showToast;
            window.connectBinanceWS = connectBinanceWS;
            window.disconnectBinanceWS = disconnectBinanceWS;
            window.resetChart = resetChart;

            // ─── AUTO CLEANUP ──────────────────────────────────────────────────
            window.addEventListener('beforeunload', function() {
                cleanupSimIntervals();
                disconnectBinanceWS();
                if (window._chartCleanup) window._chartCleanup();
                if (window._mobileCleanup) window._mobileCleanup();
                document.querySelectorAll('.toast').forEach(el => el.remove());
                document.querySelectorAll('.modal').forEach(el => el.remove());
            });

            // ─── BOOT ──────────────────────────────────────────────────────────
            applyTheme();
            if (token && currentUser) loadAllData();
            else renderAuthPage();

            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    if (simChart) {
                        const chartDiv = document.getElementById('simChartContainer');
                        if (chartDiv && chartDiv.clientWidth > 0 && chartDiv.clientHeight > 0) {
                            simChart.applyOptions({ width: chartDiv.clientWidth, height: chartDiv
                                    .clientHeight });
                            simChart.timeScale().fitContent();
                        }
                    }
                }, 300);
            });

            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (simChart) {
                        const chartDiv = document.getElementById('simChartContainer');
                        if (chartDiv && chartDiv.clientWidth > 0 && chartDiv.clientHeight > 0) {
                            simChart.applyOptions({ width: chartDiv.clientWidth, height: chartDiv
                                    .clientHeight });
                            simChart.timeScale().fitContent();
                        }
                    }
                }, 300);
            });

            window.addEventListener('popstate', () => {
                document.querySelectorAll('.modal').forEach(el => el.remove());
                document.querySelectorAll('.mt5-sidebar-overlay.show').forEach(el => el.classList.remove(
                'show'));
                document.querySelectorAll('.mt5-indicator-overlay.show').forEach(el => el.classList.remove(
                    'show'));
            });

        })();
    </script>
</body>
</html>
