<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Admin – AlamQuant ATTS</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Quill Rich Text Editor -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <style>
    :root {
      --bg: #0B1220;
      --surface: rgba(17,24,39,0.92);
      --gold: #C8A75B;
      --gold-bright: #E8C97A;
      --gold-light: #F6E4B5;
      --accent: #2563EB;
      --accent-bright: #60A5FA;
      --accent2: #7C3AED;
      --purple: #8B5CF6;
      --cyan: #22D3EE;
      --orange: #F59E0B;
      --text: #F9FAFB;
      --text-secondary: #9CA3AF;
      --danger: #EF4444;
      --success: #22C55E;
      --warning: #F59E0B;
      --border-gold: rgba(200,167,91,0.35);
      --border-accent: rgba(37,99,235,0.30);
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.3s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', 'Hind Siliguri', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
    .admin-sidebar {
      width: 260px; background: #111827; border-right: 1px solid rgba(200,167,91,0.25);
      padding: 24px 0; display: flex; flex-direction: column; position: fixed; top:0; left:0; bottom:0; overflow-y: auto; z-index: 10;
    }
    .admin-sidebar .logo {
      padding: 0 24px 20px; border-bottom: 1px solid rgba(200,167,91,0.25);
      font-size: 1.2rem; font-weight: 700; color: var(--gold);
    }
    .admin-sidebar nav { flex: 1; margin-top: 16px; }
    .admin-sidebar nav a {
      display: flex; align-items: center; gap: 10px; padding: 12px 24px;
      color: var(--text-secondary); text-decoration: none; font-weight: 500;
      border-left: 3px solid transparent; transition: var(--transition); cursor: pointer;
    }
    .admin-sidebar nav a:hover, .admin-sidebar nav a.active {
      background: rgba(37,99,235,0.12); color: var(--accent-bright);
      border-left-color: var(--accent);
    }
    .admin-main { margin-left: 260px; flex: 1; padding: 30px; overflow-x: hidden; word-wrap: break-word; }
    .card { background: var(--surface); border: 1px solid var(--border-gold); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; overflow: hidden; }

    /* ===== MODERN BUTTON STYLES ===== */
    .btn {
      background: linear-gradient(135deg, #C8A75B, #2563EB);
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
      z-index: 1;
      box-shadow: 0 4px 12px rgba(200,167,91,0.3);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(200,167,91,0.5), 0 0 20px rgba(37,99,235,0.3);
      background: linear-gradient(135deg, #E8C97A, #60A5FA);
    }
    .btn:active {
      transform: scale(0.96);
    }
    .btn:focus-visible {
      outline: 2px solid #E8C97A;
      outline-offset: 3px;
    }
    .btn::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: translate(-50%,-50%);
      transition: width 0.6s, height 0.6s, opacity 0.6s;
      opacity: 0;
    }
    .btn:active::after {
      width: 300px;
      height: 300px;
      opacity: 0;
      transition: 0s;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      box-shadow: none;
    }
    .btn-outline:hover {
      background: rgba(200,167,91,0.1);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(200,167,91,0.4);
    }
    .btn-accent {
      background: linear-gradient(135deg, var(--accent), #1d4ed8);
      box-shadow: 0 4px 12px rgba(37,99,235,0.4);
    }
    .btn-accent:hover {
      background: linear-gradient(135deg, var(--accent-bright), #2563EB);
      box-shadow: 0 8px 20px rgba(37,99,235,0.6);
    }
    .btn-danger {
      background: linear-gradient(135deg, var(--danger), #b91c1c);
      box-shadow: 0 4px 12px rgba(239,68,68,0.4);
    }
    .btn-danger:hover {
      box-shadow: 0 8px 20px rgba(239,68,68,0.6);
    }
    .btn-sm { padding: 6px 16px; font-size: 0.8rem; border-radius: 20px; }
    .btn-lg { padding: 16px 32px; font-size: 1.1rem; border-radius: 40px; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 16px; }
    .stat { background: var(--surface); border: 1px solid var(--border-gold); border-radius: var(--radius); padding: 16px; text-align: center; }
    .stat h3 { color: var(--gold); font-size: 1.8rem; margin-bottom: 4px; }
    .stat p { color: var(--text-secondary); font-size: 0.9rem; }
    table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; margin-top: 16px; }
    th { background: rgba(200,167,91,0.1); color: var(--gold); padding: 12px; text-align: left; font-weight: 600; }
    td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    tr:hover td { background: rgba(255,255,255,0.03); }
    input, select, textarea {
      background: rgba(255,255,255,0.08); border: 1px solid var(--border-gold);
      color: var(--text); padding: 8px 12px; border-radius: 6px; width: 100%; margin: 6px 0; font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent-bright); outline: none; }
    .hidden { display: none !important; }
    .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px; }
    .color-picker-group { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px; }
    .color-picker-group input[type="text"] { width: 120px; font-size: 0.75rem; }
    .color-preview { display: inline-block; width: 24px; height: 24px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }
    .media-thumb { width: 80px; height: 60px; object-fit: cover; border-radius: 6px; margin-right: 10px; }
    .ql-toolbar.ql-snow { border-color: var(--border-gold); background: rgba(255,255,255,0.05); }
    .ql-container.ql-snow { border-color: var(--border-gold); }
    .ql-editor { color: var(--text); }

    .ql-tts-section {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      background: transparent;
      font-size: 1.2rem;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .ql-tts-section:hover { background: rgba(255,255,255,0.15); }
    .ql-tts-section::before { content: '🔊'; }

    .ql-subject-block {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      background: transparent;
      font-size: 1.2rem;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .ql-subject-block:hover { background: rgba(255,255,255,0.15); }
    .ql-subject-block::before { content: '📚'; }

    .toast {
      position: fixed; top: 20px; right: 20px; background: var(--accent); color: white;
      padding: 12px 20px; border-radius: 20px; z-index: 9999; font-weight: 600;
      transition: opacity 0.3s; opacity: 1;
    }
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-content { background: var(--surface); border: 1px solid var(--border-gold); border-radius: var(--radius); padding: 24px; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; }
    .drop-zone {
      border: 2px dashed var(--border-gold); border-radius: var(--radius); padding: 30px;
      text-align: center; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.02);
    }
    .drop-zone.dragover { border-color: var(--gold-bright); background: rgba(200,167,91,0.1); }
    .media-item { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; max-width: 100%; overflow: hidden; }
    .media-item .url-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.8rem; }

    /* Chapter Editor Drawer styles */
    #section-drawer {
      flex: 1; border-left: 1px solid var(--border-gold); padding-left: 12px; max-height: 75vh; overflow-y: auto;
    }
    #section-drawer .tree-main {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      margin-bottom: 8px;
      padding: 6px;
    }
    #section-drawer .tree-main-header {
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 6px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    #section-drawer .tree-main-header:hover {
      background: rgba(255,255,255,0.05);
    }
    #section-drawer .tree-main-header .main-title {
      font-weight: 600;
      color: var(--gold-light);
      font-size: 0.9rem;
    }
    #section-drawer .tree-subs {
      padding-left: 12px;
      margin-top: 6px;
    }
    #section-drawer .tree-sub-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.04);
      padding: 4px 8px;
      border-radius: 4px;
      margin: 4px 0;
      font-size: 0.85rem;
    }
    #section-drawer .tree-sub-item .sub-label {
      flex: 1;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #section-drawer .tree-sub-item .sub-actions {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }
    #section-drawer .tree-sub-item .sub-actions .btn-sm {
      padding: 2px 8px;
      font-size: 0.65rem;
    }

    .tts-mini-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border-gold);
      color: var(--text);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      transition: all 0.2s;
    }
    .tts-mini-btn:hover:not(:disabled) {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .tts-mini-speed {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border-gold);
      color: var(--text);
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 0.65rem;
      width: 60px;
      cursor: pointer;
    }
    .tts-mini-speed:focus {
      border-color: var(--accent-bright);
      outline: none;
    }

    @media (max-width: 768px) {
      .admin-sidebar { width: 100%; height: auto; position: relative; flex-direction: row; overflow-x: auto; padding: 12px; }
      .admin-sidebar nav { display: flex; gap: 8px; margin-top: 0; }
      .admin-sidebar nav a { padding: 8px 12px; border-left: none; border-bottom: 2px solid transparent; }
      .admin-sidebar nav a.active { border-bottom-color: var(--accent); }
      .admin-main { margin-left: 0; padding: 16px; }
      .grid-2 { grid-template-columns: 1fr; }
      #chapter-editor-modal .modal-content { flex-direction: column; }
      #chapter-editor-modal .modal-content > div:first-child { flex: 1; }
      #chapter-editor-modal .modal-content > div:last-child { flex: 1; border-left: none; border-top: 1px solid var(--border-gold); padding-left: 0; padding-top: 12px; max-height: 40vh; }
    }
  </style>
</head>
<body>
  <div class="admin-sidebar">
    <div class="logo">⚙️ ATTS Admin</div>
    <nav>
      <a data-tab="stats" class="active" onclick="switchTab('stats')">📊 Dashboard</a>
      <a data-tab="users" onclick="switchTab('users')">👥 Users</a>
      <a data-tab="simulate" onclick="switchTab('simulate')">🧪 Simulate</a>
      <a data-tab="chapters" onclick="switchTab('chapters')">📚 Chapters</a>
      <a data-tab="courses" onclick="switchTab('courses')">📘 Courses</a>
      <a data-tab="content" onclick="switchTab('content')">📝 Content</a>
      <a data-tab="theme" onclick="switchTab('theme')">🎨 Theme</a>
      <a data-tab="media" onclick="switchTab('media')">🖼️ Media</a>
      <a data-tab="translations" onclick="switchTab('translations')">🌐 Translations</a>
      <a data-tab="assessments" onclick="switchTab('assessments')">📋 Assessments</a>
      <a data-tab="slideshow" onclick="switchTab('slideshow')">🖼️ Slideshow</a>
      <a data-tab="activity" onclick="switchTab('activity')">📋 Activity</a>
      <a data-tab="settings" onclick="switchTab('settings')">⚙️ Settings</a>
      <a onclick="logout()" style="color: var(--danger);">🚪 Logout</a>
    </nav>
  </div>
  <div class="admin-main">
    <!-- Login Screen -->
    <div id="login-screen">
      <div class="card" style="max-width:400px; margin:40px auto;">
        <h2 style="color:var(--gold);">🔐 Admin Login</h2>
        <input type="email" id="admin-email" placeholder="Email" autocomplete="email">
        <input type="password" id="admin-password" placeholder="Password" autocomplete="current-password">
        <button class="btn" onclick="adminLogin()" style="width:100%; margin-top:12px;">Login</button>
        <p id="login-error" style="color:var(--danger); margin-top:8px; display:none;"></p>
      </div>
    </div>
    <!-- Admin Panel (after login) -->
    <div id="panel-screen" class="hidden"></div>
  </div>

  <!-- ============================================================ -->
  <!-- CHAPTER EDITOR MODAL – REDESIGNED WITH SECTION DRAWER        -->
  <!-- ============================================================ -->
  <div id="chapter-editor-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width:1100px; display:flex; gap:20px; padding:24px; flex-direction:row;">
      <!-- Left: Editor -->
      <div style="flex:2; min-width:0;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
          <div class="flex" style="gap:8px;">
            <label style="color:var(--text-secondary);">🌐 Language:</label>
            <select id="ch-lang" onchange="switchEditorLanguage()" style="width:auto; padding:4px 10px;">
              <option value="en">English</option>
              <option value="bn">বাংলা</option>
              <option value="hi">हिन्दी</option>
            </select>
          </div>
          <button class="btn btn-sm btn-outline" onclick="closeChapterEditor()">✕</button>
        </div>
        <div class="grid-2">
          <div><label>Title</label><input type="text" id="ch-title" required></div>
          <div><label>Order</label><input type="number" id="ch-order" min="1" required></div>
        </div>
        <label>Content (HTML)</label>
        <div id="chapter-quill-editor" style="height:320px;"></div>
        <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn btn-sm" onclick="insertMainSubject()">➕ Add Main Subject</button>
          <button class="btn btn-sm btn-outline" onclick="refreshSectionTree()">🔄 Refresh Tree</button>
        </div>
        <div style="margin-top:12px;"><h4>Images</h4><div id="images-container"></div></div>
        <div style="margin-top:12px;"><h4>Videos</h4><div id="videos-container"></div></div>
        <div class="grid-2">
          <div><label>Passing Score (%)</label><input type="number" id="ch-passing" value="90"></div>
          <div><label>Master Language</label><input type="text" id="ch-language" value="en" disabled></div>
        </div>
        <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn" onclick="saveChapter()">Save</button>
          <button class="btn btn-outline" onclick="closeChapterEditor()">Cancel</button>
          <input type="hidden" id="ch-edit-id">
          <input type="hidden" id="ch-edit-lang" value="en">
        </div>
      </div>
      <!-- Right: Section Drawer -->
      <div id="section-drawer">
        <h4 style="margin-top:0;">📑 Sections</h4>
        <div id="section-tree"></div>
      </div>
    </div>
  </div>

  <!-- Question Manager Modal -->
  <div id="question-manager-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width:600px;">
      <button class="btn btn-sm btn-outline" style="float:right;" onclick="closeQuestionManager()">✕</button>
      <h3 id="qm-title">Quiz Questions</h3>
      <input type="hidden" id="qm-chapter-id">
      <button class="btn btn-sm" onclick="openQuestionForm()">+ Question</button>
      <div id="qm-questions-list" style="margin-top:16px;"></div>
      <div id="qm-question-form" class="hidden card" style="margin-top:16px;">
        <input type="text" id="qm-question-text" placeholder="Question">
        <div class="grid-2">
          <input type="text" id="qm-opt0" placeholder="Option 1">
          <input type="text" id="qm-opt1" placeholder="Option 2">
          <input type="text" id="qm-opt2" placeholder="Option 3">
          <input type="text" id="qm-opt3" placeholder="Option 4">
        </div>
        <div class="flex">
          <label>Correct Index (0-3):</label>
          <input type="number" id="qm-correct" min="0" max="3" style="width:80px;">
        </div>
        <input type="text" id="qm-explanation" placeholder="Explanation">
        <button class="btn btn-sm" onclick="saveQuestion()">Save</button>
        <button class="btn btn-sm btn-outline" onclick="cancelQuestionEdit()">Cancel</button>
        <input type="hidden" id="qm-edit-qid">
      </div>
    </div>
  </div>

  <!-- Content Edit Modal -->
  <div id="content-edit-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width:600px;">
      <button class="btn btn-sm btn-outline" style="float:right;" onclick="closeContentEditModal()">✕</button>
      <h3 id="content-edit-title">Edit Content</h3>
      <input type="hidden" id="ce-id">
      <input type="hidden" id="ce-type">
      <div id="ce-fields"></div>
      <button class="btn" onclick="saveContentEdit()" style="margin-top:16px;">Save</button>
    </div>
  </div>

  <!-- Translation Add Modal -->
  <div id="translation-add-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width:400px;">
      <button class="btn btn-sm btn-outline" style="float:right;" onclick="closeTransAddModal()">✕</button>
      <h3>Add Translation</h3>
      <input type="text" id="trans-key" placeholder="Key">
      <input type="text" id="trans-value" placeholder="Value">
      <select id="trans-lang">
        <option value="bn">বাংলা</option>
        <option value="en">English</option>
        <option value="hi">हिन्दी</option>
      </select>
      <button class="btn" onclick="saveNewTranslation()">Save</button>
    </div>
  </div>

  <!-- Assessment Question Modal -->
  <div id="assess-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width:500px;">
      <button class="btn btn-sm btn-outline" style="float:right;" onclick="closeAssessModal()">✕</button>
      <h3 id="assess-modal-title">Assessment Question</h3>
      <input type="text" id="assess-question" placeholder="Question">
      <input type="text" id="assess-category" placeholder="Category (optional)">
      <input type="number" id="assess-order" placeholder="Order" value="1">
      <button class="btn" onclick="saveAssessQuestion()">Save</button>
      <button class="btn btn-outline" onclick="closeAssessModal()">Cancel</button>
      <input type="hidden" id="assess-edit-id">
    </div>
  </div>

  <!-- Slideshow Edit Modal -->
  <div id="slideshow-edit-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <button class="btn btn-sm btn-outline" style="float:right;" onclick="closeSlideshowModal()">✕</button>
      <h3 id="slideshow-modal-title">Add Slideshow Image</h3>
      <input type="hidden" id="ss-edit-id">
      <div class="grid-2">
        <div>
          <label>Desktop Image URL</label>
          <input type="text" id="ss-desktop-url" required>
        </div>
        <div>
          <label>Mobile Image URL</label>
          <input type="text" id="ss-mobile-url" required>
        </div>
      </div>
      <label>Title</label>
      <input type="text" id="ss-title">
      <label>Link URL (optional)</label>
      <input type="text" id="ss-link">
      <div class="grid-2">
        <div>
          <label>Sort Order</label>
          <input type="number" id="ss-order" value="0">
        </div>
        <div>
          <label>Active</label>
          <select id="ss-active">
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>
        </div>
      </div>
      <button class="btn" onclick="saveSlide()">Save</button>
      <button class="btn btn-outline" onclick="closeSlideshowModal()">Cancel</button>
    </div>
  </div>

  <script>
    // ================================================================
    // QUICK FIX: register custom blots to avoid toolbar warnings
    // ================================================================
    if (typeof Quill !== 'undefined') {
      const Block = Quill.import('blots/block');
      class TtsSectionBlot extends Block {}
      TtsSectionBlot.blotName = 'tts-section';
      TtsSectionBlot.tagName = 'div';
      Quill.register('formats/tts-section', TtsSectionBlot);

      class SubjectBlockBlot extends Block {}
      SubjectBlockBlot.blotName = 'subject-block';
      SubjectBlockBlot.tagName = 'div';
      Quill.register('formats/subject-block', SubjectBlockBlot);
    }

    // ================================================================
    // GLOBALS & HELPERS
    // ================================================================
    const API = '/api/setup';
    const ADMIN_APP_VERSION = '2.0.1';
    let adminToken = localStorage.getItem('adminToken');
    let quillEditor = null;
    let currentChapterId = null;
    let chapterMasterData = null;
    let currentChapterLanguage = 'en';
    let activeEditorTTS = null;
    let activeSectionTTS = null;

    function escapeHtml(t) { return t ? String(t).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }
    function showToast(msg, dur=3000) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), dur);
    }

    async function checkVersion() {
      try {
        const res = await fetch('/api/setup/version', { cache: 'no-store' });
        const data = await res.json();
        if (data.version !== ADMIN_APP_VERSION) {
          localStorage.clear();
          sessionStorage.clear();
          window.location.reload(true);
        }
      } catch(e) {}
    }

    // ------ Admin API call ------
    async function adminApiCall(method, path, body = null, showError = true) {
      const headers = { 'Content-Type': 'application/json' };
      if (adminToken) headers['Authorization'] = `Bearer ${adminToken}`;
      const opts = { method, headers };
      if (body) opts.body = JSON.stringify(body);
      try {
        const res = await fetch(`${API}${path}`, opts);
        if (res.status === 401) { logout(); return null; }
        let data;
        try {
          const contentType = res.headers.get('content-type') || '';
          if (contentType.includes('application/json')) {
            data = await res.json();
          } else {
            if (showError) showToast('Unexpected server response');
            return null;
          }
        } catch (e) {
          if (showError) showToast('Invalid JSON response');
          return null;
        }
        if (data && data.error && showError) showToast(data.error);
        return data;
      } catch(e) {
        if (showError) showToast('Network error');
        return null;
      }
    }

    // ------ Auth ------
    function logout() {
      localStorage.removeItem('adminToken');
      adminToken = null;
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('panel-screen').classList.add('hidden');
    }

    async function adminLogin() {
      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;
      if (!email || !password) {
        document.getElementById('login-error').textContent = 'Email and password required';
        document.getElementById('login-error').style.display = 'block';
        return;
      }
      const res = await fetch(`${API}/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.token) {
        adminToken = data.token;
        localStorage.setItem('adminToken', adminToken);
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('panel-screen').classList.remove('hidden');
        switchTab('stats');
        if (data.require_password_change) showToast('Please change your password!');
      } else {
        document.getElementById('login-error').textContent = data.error || 'Login failed';
        document.getElementById('login-error').style.display = 'block';
      }
    }

    // TAB SWITCHING
    // ================================================================
    function switchTab(tab) {
      document.querySelectorAll('.admin-sidebar nav a').forEach(a => a.classList.remove('active'));
      const activeLink = document.querySelector(`.admin-sidebar nav a[data-tab="${tab}"]`);
      if (activeLink) activeLink.classList.add('active');
      switch(tab) {
        case 'stats': loadStats(); break;
        case 'users': loadUsers(); break;
        case 'simulate': loadSimulate(); break;
        case 'chapters': loadChapters(); break;
        case 'courses': loadCourses(); break;
        case 'content': loadContentManager(); break;
        case 'theme': loadThemeEditor(); break;
        case 'media': loadMediaLibrary(); break;
        case 'translations': loadTranslations(); break;
        case 'assessments': loadAssessments(); break;
        case 'slideshow': loadSlideshowAdmin(); break;
        case 'activity': loadActivity(); break;
        case 'settings': loadSettings(); break;
      }
    }

    // ----- Chapter Editor (Main+Sub) -----

    // Init Quill with custom buttons
    function initQuill() {
      destroyQuill();
      const container = document.getElementById('chapter-quill-editor');
      if (!container) return null;
      container.innerHTML = '';
      const editor = new Quill('#chapter-quill-editor', {
        theme: 'snow',
        modules: {
          toolbar: {
            container: [
              [{ 'header': [1, 2, false] }],
              ['bold', 'italic', 'underline'],
              ['image', 'video'],
              ['tts-section'],
              ['subject-block']
            ],
            handlers: {
              image: function() {
                const input = document.createElement('input');
                input.setAttribute('type', 'file');
                input.setAttribute('accept', 'image/*');
                input.click();
                input.onchange = async () => {
                  const file = input.files[0];
                  if (!file) return;
                  const url = await uploadSingleMedia(file);
                  if (url) {
                    const range = this.quill.getSelection(true);
                    this.quill.insertEmbed(range.index, 'image', url);
                    showToast('Image uploaded and inserted');
                  }
                };
              }
            }
          }
        }
      });

      // Attach custom button logic
      setTimeout(() => {
        const ttsBtn = document.querySelector('.ql-tts-section');
        if (ttsBtn) {
          ttsBtn.onclick = () => {
            const lang = prompt('Enter language code (en, bn, hi):', 'en');
            if (!lang) return;
            const html = `<div class="tts-section" data-lang="${lang}">
  <h2>Title here</h2>
  <p>Content here</p>
</div>`;
            const range = editor.getSelection(true);
            editor.clipboard.dangerouslyPasteHTML(range ? range.index : 0, html);
            refreshSectionTree();
          };
        }

        const subjectBtn = document.querySelector('.ql-subject-block');
        if (subjectBtn) {
          subjectBtn.onclick = () => {
            const mainTitle = prompt('Enter Main Subject Title:');
            if (mainTitle === null || mainTitle.trim() === '') return;

            const lang = prompt('Language code (en / bn / hi):', 'bn');
            if (!lang || !['en','bn','hi'].includes(lang)) {
              showToast('Invalid language code. Use en, bn, or hi');
              return;
            }

            const subCountInput = prompt('How many sub-subjects? (0 for none)', '2');
            if (subCountInput === null) return;
            const subCount = parseInt(subCountInput);
            if (isNaN(subCount) || subCount < 0) {
              showToast('Please enter a valid number (0 or more)');
              return;
            }

            const subTitles = [];
            for (let i = 0; i < subCount; i++) {
              const subTitle = prompt(`Sub-subject ${i + 1} title:`);
              if (subTitle === null) return;
              if (subTitle.trim() !== '') subTitles.push(subTitle.trim());
            }

            if (subTitles.length === 0) {
              showToast('No sub-subjects added. Use TTS Section button for single blocks.');
              return;
            }

            let html = `<div class="main-subject" data-main-title="${escapeHtml(mainTitle)}" data-lang="${lang}">`;
            for (const subTitle of subTitles) {
              html += `<div class="tts-section" data-lang="${lang}">
  <h2>${escapeHtml(mainTitle)} – ${escapeHtml(subTitle)}</h2>
  <p>Write content here for "${escapeHtml(subTitle)}"</p>
</div>`;
            }
            html += `</div>`;

            const range = editor.getSelection(true);
            editor.clipboard.dangerouslyPasteHTML(range ? range.index : 0, html);
            showToast(`✅ ${subTitles.length} sub-subject(s) added (lang: ${lang})`);
            refreshSectionTree();
          };
        }
      }, 100);

      return editor;
    }

    function destroyQuill() {
      if (quillEditor) {
        const container = document.getElementById('chapter-quill-editor');
        if (container) {
          container.innerHTML = '';
        }
        quillEditor = null;
      }
    }

    // Open chapter editor
    async function openChapterEditor(id) {
      document.getElementById('chapter-editor-modal').classList.remove('hidden');
      // Reset fields
      document.getElementById('ch-title').value = '';
      document.getElementById('ch-order').value = '';
      document.getElementById('ch-passing').value = 90;
      document.getElementById('ch-edit-id').value = '';
      document.getElementById('ch-edit-lang').value = 'en';
      document.getElementById('ch-lang').value = 'en';
      document.getElementById('images-container').innerHTML = '';
      document.getElementById('videos-container').innerHTML = '';
      addImageField();
      addVideoField();

      destroyQuill();
      quillEditor = initQuill();

      if (id) {
        currentChapterId = id;
        const chapters = await adminApiCall('GET', '/admin/chapters?course_id=1');
        const ch = chapters.find(c => c.id == id);
        if (ch) {
          chapterMasterData = ch;
          document.getElementById('ch-title').value = ch.title;
          document.getElementById('ch-order').value = ch.order_index;
          document.getElementById('ch-passing').value = ch.passing_score || 90;
          document.getElementById('ch-edit-id').value = ch.id;
          document.getElementById('ch-language').value = 'en';
          setTimeout(() => {
            if (quillEditor) {
              quillEditor.root.innerHTML = ch.content_text || '';
              refreshSectionTree();
            }
          }, 100);
          if (ch.images && ch.images.length) {
            document.getElementById('images-container').innerHTML = '';
            ch.images.forEach(url => addImageField(url));
          }
          if (ch.videos && ch.videos.length) {
            document.getElementById('videos-container').innerHTML = '';
            ch.videos.forEach(url => addVideoField(url));
          }
        }
      } else {
        currentChapterId = null;
        chapterMasterData = null;
        setTimeout(() => {
          if (quillEditor) {
            quillEditor.root.innerHTML = '';
            refreshSectionTree();
          }
        }, 100);
      }
    }

    // Switch editor language
    async function switchEditorLanguage() {
      const lang = document.getElementById('ch-lang').value;
      currentChapterLanguage = lang;
      document.getElementById('ch-edit-lang').value = lang;
      if (!currentChapterId) {
        showToast('Save the English version first, then switch language to add translations.');
        return;
      }
      if (lang === 'en') {
        if (chapterMasterData) {
          document.getElementById('ch-title').value = chapterMasterData.title || '';
          if (quillEditor) quillEditor.root.innerHTML = chapterMasterData.content_text || '';
        }
      } else {
        const trans = await adminApiCall('GET', `/admin/chapter/${currentChapterId}/translations?lang=${lang}`, null, false);
        if (trans && trans.title) {
          document.getElementById('ch-title').value = trans.title;
          if (quillEditor) quillEditor.root.innerHTML = trans.content_text || '';
        } else {
          document.getElementById('ch-title').value = '';
          if (quillEditor) quillEditor.root.innerHTML = '';
          showToast('No translation yet for this language.');
        }
      }
      refreshSectionTree();
    }

    // Save chapter
    async function saveChapter() {
      const lang = document.getElementById('ch-edit-lang').value;
      const title = document.getElementById('ch-title').value.trim();
      const order_index = parseInt(document.getElementById('ch-order').value);
      const content_text = quillEditor ? quillEditor.root.innerHTML : '';
      const images = Array.from(document.querySelectorAll('.ch-image-url')).map(inp => inp.value.trim()).filter(u => u);
      const videos = Array.from(document.querySelectorAll('.ch-video-url')).map(inp => inp.value.trim()).filter(u => u);
      const passing_score = parseInt(document.getElementById('ch-passing').value);
      const chapterId = document.getElementById('ch-edit-id').value;

      if (!title || !order_index) return showToast('Title and order required');

      if (lang === 'en') {
        const body = { course_id: 1, title, order_index, content_text, images, videos, passing_score, language: 'en' };
        let result;
        if (chapterId) {
          await adminApiCall('PUT', `/admin/chapter/${chapterId}`, body);
          result = { id: parseInt(chapterId) };
        } else {
          result = await adminApiCall('POST', '/admin/chapter', body);
        }
        if (result && result.id) currentChapterId = result.id;
        chapterMasterData = { title, content_text, images, videos, passing_score };
      } else {
        if (!currentChapterId) return showToast('Save English chapter first');
        await adminApiCall('POST', '/admin/translations/content', {
          table_name: 'chapters',
          record_id: parseInt(currentChapterId),
          language_code: lang,
          translations: { title, content_text }
        });
      }
      closeChapterEditor();
      loadChapters();
      showToast('✅ Chapter saved');
    }

    // Close editor
    function closeChapterEditor() {
      document.getElementById('chapter-editor-modal').classList.add('hidden');
      destroyQuill();
      document.getElementById('section-tree').innerHTML = '';
    }

    // ==================== Main / Sub Section Logic ====================

    // Insert Main Subject
    function insertMainSubject() {
      if (!quillEditor) return showToast('Editor not ready');
      const title = prompt('Main Subject Title (e.g., Money Management):');
      if (!title) return;
      const lang = document.getElementById('ch-lang').value || 'en';
      const html = `<div class="main-subject" data-main-title="${escapeHtml(title)}" data-lang="${lang}"></div>`;
      quillEditor.clipboard.dangerouslyPasteHTML(quillEditor.getLength(), html);
      refreshSectionTree();
    }

    // Add Sub Section to a specific main
    function addSubSection(mainIndex) {
      if (!quillEditor) return;
      const mainDivs = quillEditor.root.querySelectorAll('.main-subject');
      if (mainIndex >= mainDivs.length) return;
      const mainDiv = mainDivs[mainIndex];
      const lang = mainDiv.getAttribute('data-lang') || 'en';
      const subTitle = prompt('Sub-subject title:');
      if (!subTitle) return;
      const html = `<div class="tts-section" data-lang="${lang}"><h2>${escapeHtml(subTitle)}</h2><p>Write content here...</p></div>`;
      mainDiv.insertAdjacentHTML('beforeend', html);
      quillEditor.update();
      refreshSectionTree();
    }

    // Refresh Section Tree (Drawer)
    function refreshSectionTree() {
      if (!quillEditor) return;
      const container = document.getElementById('section-tree');
      if (!container) return;

      const mainDivs = quillEditor.root.querySelectorAll('.main-subject');
      let html = '';
      if (mainDivs.length === 0) {
        html = '<p style="color:var(--text-secondary);">No main subject added yet. Click "Add Main Subject" to start.</p>';
        container.innerHTML = html;
        return;
      }

      mainDivs.forEach((mainDiv, mIdx) => {
        const mainTitle = mainDiv.getAttribute('data-main-title') || 'Untitled';
        const lang = mainDiv.getAttribute('data-lang') || 'en';
        const subDivs = mainDiv.querySelectorAll('.tts-section');

        html += `
          <div class="tree-main">
            <div class="tree-main-header" onclick="toggleSubSections(this)">
              <span class="main-title">▶ ${escapeHtml(mainTitle)} (${lang})</span>
              <div style="display:flex; gap:4px; flex-wrap:wrap;">
                <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); addSubSection(${mIdx})" title="Add Sub">➕</button>
                <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); editMainTitle(${mIdx})" title="Edit">✏️</button>
                <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteMain(${mIdx})" title="Delete">🗑</button>
                <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); playMainTTS(${mIdx}, this)" title="TTS">🔊</button>
              </div>
            </div>
            <div class="tree-subs" style="display:none; padding-left:12px; margin-top:6px;">`;

        subDivs.forEach((subDiv, sIdx) => {
          const h2 = subDiv.querySelector('h2');
          const subTitle = h2 ? h2.textContent : 'Untitled';
          html += `
            <div class="tree-sub-item">
              <span class="sub-label">${sIdx+1}. ${escapeHtml(subTitle)}</span>
              <div class="sub-actions">
                <select class="tts-mini-speed" style="display:none; font-size:0.65rem; width:50px; background:rgba(255,255,255,0.08); border:1px solid var(--border-gold); color:var(--text); padding:2px 4px; border-radius:4px;">
                  <option value="0.5">0.5x</option><option value="0.75">0.75x</option>
                  <option value="1" selected>1x</option>
                  <option value="1.25">1.25x</option><option value="1.5">1.5x</option><option value="2">2x</option>
                </select>
                <button class="tts-mini-btn play-btn" onclick="playSubTTS(${mIdx},${sIdx},this)" title="Play">▶</button>
                <button class="tts-mini-btn stop-btn" onclick="stopSubTTS()" style="display:none;" title="Stop">⏹</button>
                <button class="btn btn-sm btn-outline" onclick="editSubTitle(${mIdx},${sIdx})" title="Edit">✏️</button>
                <button class="btn btn-sm btn-danger" onclick="deleteSub(${mIdx},${sIdx})" title="Delete">🗑</button>
              </div>
            </div>`;
        });

        html += `</div></div>`;
      });

      container.innerHTML = html;
    }

    // Toggle subs in drawer
    function toggleSubSections(header) {
      const parent = header.parentElement;
      const subs = parent.querySelector('.tree-subs');
      if (subs) {
        const isHidden = subs.style.display === 'none';
        subs.style.display = isHidden ? 'block' : 'none';
        const mainTitleSpan = header.querySelector('.main-title');
        if (mainTitleSpan) {
          mainTitleSpan.textContent = isHidden
            ? mainTitleSpan.textContent.replace('▶', '▼')
            : mainTitleSpan.textContent.replace('▼', '▶');
        }
      }
    }

    // Edit Main Title
    function editMainTitle(index) {
      const mainDivs = quillEditor.root.querySelectorAll('.main-subject');
      if (index >= mainDivs.length) return;
      const current = mainDivs[index].getAttribute('data-main-title') || '';
      const newTitle = prompt('New Main Subject Title:', current);
      if (newTitle === null) return;
      mainDivs[index].setAttribute('data-main-title', newTitle);
      quillEditor.update();
      refreshSectionTree();
    }

    // Delete Main (and all subs)
    function deleteMain(index) {
      if (!confirm('Delete this main subject and all its sub-sections?')) return;
      const mainDivs = quillEditor.root.querySelectorAll('.main-subject');
      if (index < mainDivs.length) {
        mainDivs[index].remove();
        quillEditor.update();
        refreshSectionTree();
      }
    }

    // Edit Sub Title
    function editSubTitle(mIdx, sIdx) {
      const mainDivs = quillEditor.root.querySelectorAll('.main-subject');
      if (mIdx >= mainDivs.length) return;
      const subDivs = mainDivs[mIdx].querySelectorAll('.tts-section');
      if (sIdx >= subDivs.length) return;
      const h2 = subDivs[sIdx].querySelector('h2');
      const current = h2 ? h2.textContent : '';

    // ==================== Editor TTS ====================

    function getSubText(mIdx, sIdx) {
      const mainDivs = quillEditor.root.querySelectorAll('.main-subject');
      if (mIdx >= mainDivs.length) return '';
      const subDivs = mainDivs[mIdx].querySelectorAll('.tts-section');
      if (sIdx >= subDivs.length) return '';
      return subDivs[sIdx].innerText;
    }

    function playSubTTS(mIdx, sIdx, btn) {
      const text = getSubText(mIdx, sIdx);
      if (!text) return;

      if (activeEditorTTS && activeEditorTTS.mIdx === mIdx && activeEditorTTS.sIdx === sIdx) {
        if (speechSynthesis.speaking) {
          speechSynthesis.pause();
          btn.textContent = '⏸';
          return;
        } else if (speechSynthesis.paused) {
          speechSynthesis.resume();
          btn.textContent = '▶';
          return;
        }
      }

      if (speechSynthesis.speaking || speechSynthesis.paused) {
        speechSynthesis.cancel();
        resetEditorTTSButtons();
      }

      const utterance = new SpeechSynthesisUtterance(text);
      const speedSelect = btn.parentElement.querySelector('.tts-mini-speed');
      const stopBtn = btn.parentElement.querySelector('.stop-btn');

      utterance.rate = speedSelect ? parseFloat(speedSelect.value) : 1;

      const lang = document.getElementById('ch-lang').value || 'en';
      const voices = speechSynthesis.getVoices();
      if (lang === 'bn') {
        utterance.lang = 'bn-BD';
        const v = voices.find(v => v.lang.startsWith('bn'));
        if (v) utterance.voice = v;
      } else if (lang === 'hi') {
        utterance.lang = 'hi-IN';
        const v = voices.find(v => v.lang.startsWith('hi'));
        if (v) utterance.voice = v;
      } else {
        utterance.lang = 'en-US';
        const v = voices.find(v => v.name.includes('female') || v.name.includes('Samantha'));
        if (v) utterance.voice = v;
      }

      btn.textContent = '⏸';
      if (speedSelect) speedSelect.style.display = 'inline-block';
      if (stopBtn) stopBtn.style.display = 'inline-block';

      activeEditorTTS = { mIdx, sIdx, utterance, playBtn: btn, stopBtn, speedSelect };

      utterance.onend = () => {
        resetEditorTTSButtons();
        activeEditorTTS = null;
      };
      utterance.onerror = () => {
        resetEditorTTSButtons();
        activeEditorTTS = null;
      };

      speechSynthesis.speak(utterance);
    }

    function stopSubTTS() {
      if (speechSynthesis.speaking || speechSynthesis.paused) {
        speechSynthesis.cancel();
      }
      resetEditorTTSButtons();
      activeEditorTTS = null;
    }

    function resetEditorTTSButtons() {
      document.querySelectorAll('#section-tree .play-btn').forEach(b => b.textContent = '▶');
      document.querySelectorAll('#section-tree .stop-btn').forEach(b => b.style.display = 'none');
      document.querySelectorAll('#section-tree .tts-mini-speed').forEach(s => s.style.display = 'none');
    }

    function playMainTTS(mIdx, btn) {
      const mainDivs = quillEditor.root.querySelectorAll('.main-subject');
      if (mIdx >= mainDivs.length) return;
      const text = mainDivs[mIdx].innerText;
      if (!text) return;

      if (activeEditorTTS) {
        speechSynthesis.cancel();
        resetEditorTTSButtons();
        activeEditorTTS = null;
        return;
      }

      const utterance = new SpeechSynthesisUtterance(text);
      const lang = document.getElementById('ch-lang').value || 'en';
      const voices = speechSynthesis.getVoices();
      if (lang === 'bn') {
        utterance.lang = 'bn-BD';
        const v = voices.find(v => v.lang.startsWith('bn'));
        if (v) utterance.voice = v;
      } else if (lang === 'hi') {
        utterance.lang = 'hi-IN';
        const v = voices.find(v => v.lang.startsWith('hi'));
        if (v) utterance.voice = v;
      } else {
        utterance.lang = 'en-US';
        const v = voices.find(v => v.name.includes('female') || v.name.includes('Samantha'));
        if (v) utterance.voice = v;
      }

      utterance.rate = 1;
      btn.textContent = '⏸';

      utterance.onend = () => {
        btn.textContent = '🔊';
        activeEditorTTS = null;
      };
      utterance.onerror = () => {
        btn.textContent = '🔊';

      };

      activeEditorTTS = { utterance, playBtn: btn };
      speechSynthesis.speak(utterance);
    }

    async function triggerChapterImageUpload(btn) {
      const fileInput = btn.parentElement.querySelector('.ch-image-upload');

    // ----- Single Media Upload -----
    async function uploadSingleMedia(file, allowVideo = false) {
      try {
        if (!adminToken) {
          showToast('Not authenticated');
          return null;
        }
        const validTypes = allowVideo ? ['image/png','image/jpeg','image/webp','image/gif','video/mp4','video/webm'] : ['image/png','image/jpeg','image/webp','image/gif'];
        if (!validTypes.includes(file.type)) {
          showToast('File type not supported');
          return null;
        }
        let processedFile = file;
        if (file.type.startsWith('image/')) processedFile = await resizeImage(file, 1200);
        const formData = new FormData();
        formData.append('image', processedFile);
        const res = await fetch(`${API}/admin/upload-image`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${adminToken}` },
          body: formData
        });
        const data = await res.json();
        if (data.error) {
          showToast('Upload Error: ' + data.error);
          return null;
        }
        if (data.url) {
          showToast('Upload successful');
          return data.url;
        }
        showToast('Upload failed (no URL returned)');
        return null;
      } catch(e) {
        showToast('Network error: ' + e.message);
        return null;
      }
    }

    async function resizeImage(file, maxWidth) {
      const img = await createImageBitmap(file);
      const canvas = document.createElement('canvas');
      const ratio = maxWidth / img.width;
      canvas.width = maxWidth;
      canvas.height = img.height * ratio;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.8));
      return new File([blob], file.name, { type: 'image/jpeg' });
    }

      let html = `<div class="card"><h3>🖼️ Media Library</h3>
        <div class="drop-zone" id="media-drop-zone">
          <p>📁 Drag & drop images/videos here or click</p>
          <input type="file" id="media-file-input" accept="image/*,video/*" multiple style="display:none;">
        </div>
        <div class="flex" style="gap:8px; margin-bottom:12px;">
          <button class="btn btn-sm" onclick="document.getElementById('media-folder-input').click()">📂 Folder Upload</button>
          <input type="file" id="media-folder-input" webkitdirectory multiple style="display:none;" onchange="uploadFolderFiles(this.files)">
          <input type="text" id="media-url-input" placeholder="Or paste URL" style="flex:1;">
          <button class="btn btn-sm" onclick="addMediaUrl()">Add URL</button>
        </div>
        <div id="media-list" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:16px;">`;
      if (res) {
        res.forEach(m => {
          if (m.url.match(/\.(mp4|webm|mov)$/i)) {
            html += `<div class="media-item">
              <video src="${m.url}" class="media-thumb" muted></video>
              <span class="url-text">${m.url}</span>
              <button class="btn btn-sm btn-danger" onclick="deleteMedia(${m.id})">🗑</button>
            </div>`;
          } else {
            html += `<div class="media-item">
              <img src="${m.url}" class="media-thumb" onerror="this.style.display='none'">
              <span class="url-text">${m.url}</span>
              <button class="btn btn-sm btn-danger" onclick="deleteMedia(${m.id})">🗑</button>
            </div>`;
          }
        });
      }
      html += '</div></div>';
      document.getElementById('panel-screen').innerHTML = html;
      initMediaDropZone();
    }

    function initMediaDropZone() {
      const dz = document.getElementById('media-drop-zone');
      const fi = document.getElementById('media-file-input');
      if (!dz || !fi) return;
      dz.addEventListener('click', () => fi.click());
      dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragover'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
      dz.addEventListener('drop', (e) => {
        e.preventDefault();
        dz.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length) for (let f of files) uploadSingleMedia(f);
      });
      fi.addEventListener('change', (e) => { for (let f of e.target.files) uploadSingleMedia(f); });
    }

    async function uploadFolderFiles(fileList) { for (let file of fileList) await uploadSingleMedia(file, true); }

    async function uploadImage() {
      const file = document.getElementById('image-upload').files[0];
      if (!file) return showToast('Select a file');
      const url = await uploadSingleMedia(file);
      if (url) showToast('Uploaded!');
    }

    // ----- Export Training Data -----
    async function exportTrainingData() {
      try {
        const res = await fetch(`${API}/admin/export/training`, {
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        if (!res.ok) {
          const err = await res.json();
          showToast('Export failed: ' + (err.error || 'Unknown error'));
          return;
        }
        const data = await res.json();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `training-backup-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('✅ Training data exported successfully!');
      } catch (e) {
        showToast('Export failed: ' + e.message);
      }
    }

    // ----- Import Training Data -----
    async function importTrainingData() {
      const fileInput = document.getElementById('restore-file');
      const statusDiv = document.getElementById('restore-status');
      if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
        showToast('Please select a JSON backup file first');
        return;
      }
      const file = fileInput.files[0];
      if (!file.name.endsWith('.json')) {
        showToast('Please select a JSON file');
        return;
      }
      try {
        statusDiv.innerHTML = '<span style="color:var(--warning);">⏳ Restoring training data...</span>';
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const jsonData = JSON.parse(e.target.result);
            const res = await fetch(`${API}/admin/import/training`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${adminToken}`
              },
              body: JSON.stringify(jsonData)
            });
            const result = await res.json();
            if (result.success) {
              statusDiv.innerHTML = `<span style="color:var(--success);">✅ ${result.message}</span>`;
              showToast('✅ Training data restored successfully!');
              fileInput.value = '';
            } else {
              statusDiv.innerHTML = `<span style="color:var(--danger);">❌ ${result.error || 'Restore failed'}</span>`;
              showToast('Restore failed: ' + (result.error || 'Unknown error'));
            }
          } catch (parseErr) {
            statusDiv.innerHTML = `<span style="color:var(--danger);">❌ Invalid JSON file</span>`;
            showToast('Invalid JSON file');
          }
        };
        reader.readAsText(file);
      } catch (e) {
        statusDiv.innerHTML = `<span style="color:var(--danger);">❌ ${e.message}</span>`;
        showToast('Import failed: ' + e.message);
      }
    }

    // ----- Change Admin Password -----
    async function changeAdminPassword() {
      const current = document.getElementById('current-password').value;
      const newPass = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      if (newPass !== confirm) return showToast('Passwords do not match');

      const res = await adminApiCall('PUT', '/admin/change-password', { current_password: current, new_password: newPass });

        document.getElementById('settings-message').innerHTML = '<span style="color:var(--success);">Success</span>';
      } else {
        document.getElementById('settings-message').innerHTML = `<span style="color:var(--danger);">${res?.error || 'Error'}</span>`;
      }
    }

    }
